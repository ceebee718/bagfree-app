// ── MARKETPLACE ────────────────────────────────────────────────────────────────
function Marketplace({ addToCart, catFilter, setCatFilter }) {
  const [search, setSearch] = useState('');
  const [selected, setSelected] = useState(null);
  const [added, setAdded] = useState(null);

  const filtered = PRODUCTS.filter(p => {
    if (catFilter !== 'all' && p.category !== catFilter) return false;
    if (search && !p.name.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  function handleAdd(product) {
    addToCart(product);
    setAdded(product.id);
    setTimeout(()=>setAdded(null), 1800);
  }

  if (selected) return <ProductDetail product={selected} onBack={()=>setSelected(null)} onAdd={handleAdd} added={added} />;

  return (
    <div style={{paddingTop:80}}>
      <div style={{background:'var(--noir-2)',borderBottom:'1px solid var(--border)',padding:'1.25rem 2.5rem',display:'flex',gap:'1rem',flexWrap:'wrap',alignItems:'center'}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search products..."
          style={{flex:1,minWidth:180,background:'var(--mist-xlow)',border:'1px solid var(--border)',color:'var(--white)',padding:'0.6rem 1rem',fontSize:'0.85rem',outline:'none'}}/>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {CATEGORIES.map(c=>(
            <button key={c.id} onClick={()=>setCatFilter(c.id)}
              style={{background:catFilter===c.id?'var(--gold)':'transparent',color:catFilter===c.id?'var(--noir)':'var(--mist)',border:`1px solid ${catFilter===c.id?'var(--gold)':'var(--border)'}`,padding:'0.45rem 0.9rem',fontSize:'0.65rem',letterSpacing:'1.5px',textTransform:'uppercase',transition:'all 0.2s'}}>
              {c.icon} {c.label}
            </button>
          ))}
        </div>
      </div>
      <div style={{padding:'2rem 2.5rem'}}>
        <div style={{fontSize:'0.78rem',color:'var(--mist)',marginBottom:'1.5rem'}}>{filtered.length} products from Valet By Nuor</div>
        {filtered.length === 0 ? (
          <div style={{textAlign:'center',padding:'5rem',color:'var(--mist)'}}>
            <div style={{fontFamily:'var(--ff-display)',fontSize:'2rem',fontWeight:300,marginBottom:'0.75rem'}}>No products found</div>
            <button onClick={()=>{setSearch('');setCatFilter('all');}} style={{background:'var(--gold)',color:'var(--noir)',padding:'0.7rem 2rem',border:'none',fontSize:'0.68rem',letterSpacing:'2px',textTransform:'uppercase',marginTop:'1rem'}}>Clear Filters</button>
          </div>
        ) : (
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:12}}>
            {filtered.map(p=>(
              <div key={p.id} style={{background:'var(--noir-3)',border:'1px solid var(--border)',padding:'1.5rem',cursor:'pointer',transition:'border-color 0.2s',position:'relative'}}
                onMouseEnter={e=>e.currentTarget.style.borderColor='var(--border-hi)'}
                onMouseLeave={e=>e.currentTarget.style.borderColor='var(--border)'}
                onClick={()=>setSelected(p)}>
                {p.tag && <div style={{position:'absolute',top:'1rem',right:'1rem',fontSize:'0.55rem',letterSpacing:'1.5px',textTransform:'uppercase',color:'var(--gold)',border:'1px solid var(--border-hi)',padding:'2px 8px'}}>{p.tag}</div>}
                <div style={{fontSize:'2.5rem',opacity:0.45,marginBottom:'1rem'}}>{p.icon}</div>
                <div style={{fontSize:'0.6rem',letterSpacing:'2px',textTransform:'uppercase',color:'var(--gold-dim)',marginBottom:'0.4rem'}}>{CATEGORIES.find(c=>c.id===p.category)?.label}</div>
                <div style={{fontFamily:'var(--ff-display)',fontSize:'1.1rem',fontWeight:300,color:'var(--white)',marginBottom:'0.5rem',lineHeight:1.25}}>{p.name}</div>
                <div style={{fontSize:'0.75rem',color:'var(--mist)',lineHeight:1.7,marginBottom:'1rem'}}>{p.desc.slice(0,80)}...</div>
                <div style={{fontFamily:'var(--ff-display)',fontSize:'1.4rem',fontWeight:300,color:'var(--gold)',marginBottom:'1rem'}}>
                  {p.price ? `$${p.price}` : 'View Collection'}
                </div>
                {added===p.id ? (
                  <div style={{background:'var(--gold)',color:'var(--noir)',padding:'0.6rem',fontSize:'0.65rem',letterSpacing:'2px',textTransform:'uppercase',textAlign:'center',fontWeight:500}}>Added ✓</div>
                ) : (
                  <button onClick={e=>{e.stopPropagation();if(p.price)handleAdd(p);else window.open(p.url,'_blank');}}
                    style={{width:'100%',background:'transparent',color:'var(--gold)',padding:'0.6rem',border:'1px solid var(--border-hi)',fontSize:'0.65rem',letterSpacing:'2px',textTransform:'uppercase'}}>
                    {p.price ? `Add to Cart — $${p.price}` : 'View on Valet By Nuor →'}
                  </button>
                )}
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

              <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:8}}>
                {[["Men's Wear",'👔'],["Women's Wear",'👗'],['Wellness','💊'],['Baby & Family','🍼'],['Tech & Accessories','📷'],['Other','✦']].map(([c,icon])=>(
                  <div key={c} onClick={()=>setForm({...form,category:c})} style={{padding:'0.75rem 1rem',border:`1px solid ${form.category===c?'var(--border-hi)':'var(--border)'}`,cursor:'pointer',fontSize:'0.78rem',color:form.category===c?'var(--white)':'var(--mist)',background:form.category===c?'var(--mist-xlow)':'transparent'}}>
                    {icon} {c}
                  </div>
                ))}
              </div>
            </div>
            <div>
              <div style={{fontSize:'0.6rem',letterSpacing:'2px',textTransform:'uppercase',color:'var(--mist)',marginBottom:'0.75rem'}}>Destinations You Can Service</div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:8}}>
                {DESTINATIONS.map(d=>(
                  <div key={d.id} onClick={()=>toggleDest(d.id)} style={{padding:'0.75rem 1rem',border:`1px solid ${form.destinations.includes(d.id)?'var(--border-hi)':'var(--border)'}`,cursor:'pointer',fontSize:'0.78rem',color:form.destinations.includes(d.id)?'var(--white)':'var(--mist)',background:form.destinations.includes(d.id)?'var(--mist-xlow)':'transparent',display:'flex',alignItems:'center',gap:'0.5rem'}}>
                    {d.img} {d.name}
                  </div>
                ))}
              </div>
            </div>
            <div>
              <div style={{fontSize:'0.6rem',letterSpacing:'2px',textTransform:'uppercase',color:'var(--mist)',marginBottom:'0.5rem'}}>Rental Model</div>
              <div style={{display:'flex',gap:8}}>
                {[['rent','Rent Only'],['own','Sell Only'],['both','Both']].map(([v,l])=>(
                  <div key={v} onClick={()=>setForm({...form,model:v})} style={{flex:1,padding:'0.75rem',border:`1px solid ${form.model===v?'var(--border-hi)':'var(--border)'}`,cursor:'pointer',fontSize:'0.72rem',color:form.model===v?'var(--white)':'var(--mist)',background:form.model===v?'var(--mist-xlow)':'transparent',textAlign:'center'}}>{l}</div>
                ))}
              </div>
            </div>
            <div style={{display:'flex',gap:'1rem'}}>
              <button onClick={()=>setStep(1)} style={{background:'transparent',color:'var(--mist)',padding:'0.9rem 1.5rem',border:'1px solid var(--border)',fontSize:'0.68rem',letterSpacing:'2px',textTransform:'uppercase'}}>← Back</button>
              <button onClick={()=>form.category&&form.destinations.length>0&&setStep(3)} style={{flex:1,background:'var(--gold)',color:'var(--noir)',padding:'1rem',border:'none',fontSize:'0.7rem',fontWeight:500,letterSpacing:'3px',textTransform:'uppercase',opacity:!form.category||form.destinations.length===0?0.4:1}}>Continue →</button>
            </div>
          </div>
        )}
        {step===3 && (
          <div style={{display:'flex',flexDirection:'column',gap:'1.25rem'}}>
            <div>
              <div style={{fontSize:'0.6rem',letterSpacing:'2px',textTransform:'uppercase',color:'var(--mist)',marginBottom:'0.4rem'}}>Tell us about your products</div>
              <textarea value={form.description} onChange={e=>setForm({...form,description:e.target.value})} rows={5} placeholder="Describe your products and why you'd be a great BagFree supplier..." style={{width:'100%',background:'var(--mist-xlow)',border:'1px solid var(--border)',color:'var(--white)',padding:'0.75rem 1rem',fontSize:'0.88rem',outline:'none',resize:'vertical',fontFamily:'var(--ff-body)',lineHeight:1.7}}/>
            </div>
            <div style={{padding:'1.1rem',background:'var(--mist-xlow)',border:'1px solid var(--border)',fontSize:'0.78rem',color:'var(--mist)',lineHeight:1.8}}>
              <span style={{color:'var(--gold)'}}>Logistics note:</span> All BagFree suppliers integrate with Valet By Nuor for fulfillment across Florida and Georgia. We handle the last-mile delivery — you handle the inventory.
            </div>
            <div style={{display:'flex',gap:'1rem'}}>
              <button onClick={()=>setStep(2)} style={{background:'transparent',color:'var(--mist)',padding:'0.9rem 1.5rem',border:'1px solid var(--border)',fontSize:'0.68rem',letterSpacing:'2px',textTransform:'uppercase'}}>← Back</button>
              <button onClick={()=>setDone(true)} style={{flex:1,background:'var(--gold)',color:'var(--noir)',padding:'1rem',border:'none',fontSize:'0.7rem',fontWeight:500,letterSpacing:'3px',textTransform:'uppercase'}}>Submit Application</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState('home');
  const [cart, setCart] = useState([]);
  const [catFilter, setCatFilter] = useState('all');

  return (
    <>
      <Nav page={page} setPage={setPage} cartCount={cart.length} />
      {page==='home' && <Home setPage={setPage} setCatFilter={setCatFilter} />}
      {page==='marketplace' && <Marketplace addToCart={p=>setCart(c=>[...c,p])} catFilter={catFilter} setCatFilter={setCatFilter} />}
      {page==='cart' && <Cart cart={cart} removeFromCart={i=>setCart(c=>c.filter((_,idx)=>idx!==i))} setPage={setPage} />}
      {page==='supplier' && <SupplierPortal />}
      <footer style={{background:'var(--noir-2)',padding:'2rem 3rem',display:'flex',justifyContent:'space-between',alignItems:'center',borderTop:'1px solid var(--border)',flexWrap:'wrap',gap:'1rem'}}>
        <div style={{fontFamily:'var(--ff-display)',fontSize:'1.2rem',fontWeight:300,letterSpacing:'3px',textTransform:'uppercase'}}>Bag<span style={{color:'var(--gold)'}}>Free</span></div>
        <div style={{fontSize:'0.68rem',color:'var(--mist)',letterSpacing:'1px'}}>Powered by Valet By Nuor · <a href="https://valetbynuor.com" target="_blank" style={{color:'var(--gold)',textDecoration:'none'}}>valetbynuor.com</a> · (813) XXX-XXXX</div>
        <div style={{fontSize:'0.65rem',color:'var(--mist)'}}>© 2026 BagFree · All rights reserved</div>
      </footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
