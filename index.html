<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BagFree — Travel, Redefined</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --noir:#0A0A08;
  --gold:#C9A96E;
  --white:#FDFCF8;
  --mist:rgba(253,252,248,0.6);
}

body {
  margin:0;
  font-family:'Jost', sans-serif;
  background:var(--noir);
  color:var(--white);
}

/* HERO */
.hero {
  display:flex;
  min-height:100vh;
}

/* LEFT */
.hero-left {
  flex:1;
  padding:80px 60px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  position:relative;
  z-index:2;
}

/* RIGHT IMAGE */
.hero-right {
  flex:1;
  position:relative;
  overflow:hidden;
}

.hero-right img {
  width:100%;
  height:100%;
  object-fit:cover;
  filter: brightness(0.92) contrast(1.05);
}

/* OVERLAY */
.hero-right::after {
  content:"";
  position:absolute;
  inset:0;
  background: linear-gradient(
    to right,
    rgba(10,10,8,0.78) 0%,
    rgba(10,10,8,0.55) 35%,
    rgba(10,10,8,0.18) 60%,
    transparent 80%
  );
}

/* TAGLINE */
.tagline {
  font-size:0.6rem;
  letter-spacing:4px;
  text-transform:uppercase;
  color:var(--gold);
  opacity:0.8;
  margin-bottom:1.2rem;
}

/* HEADLINE */
.hero h1 {
  font-family:'Cormorant Garamond', serif;
  font-size:clamp(2.8rem,5vw,4.6rem);
  font-weight:300;
  line-height:1.02;
  letter-spacing:-0.5px;
  margin-bottom:1.2rem;
}

.hero em {
  color:var(--gold);
  font-style:italic;
}

/* TEXT */
.hero p {
  font-size:0.9rem;
  color:var(--mist);
  line-height:1.8;
  max-width:460px;
}

/* BUTTONS */
.cta {
  display:flex;
  gap:14px;
  margin-top:28px;
}

.btn-primary {
  background:var(--gold);
  color:#000;
  padding:14px 28px;
  border:none;
  font-size:0.7rem;
  letter-spacing:2px;
  text-transform:uppercase;
  cursor:pointer;
  transition:0.3s;
}

.btn-primary:hover {
  transform:translateY(-2px);
  opacity:0.9;
}

.btn-secondary {
  background:transparent;
  color:var(--white);
  padding:14px 28px;
  border:1px solid rgba(255,255,255,0.2);
  font-size:0.7rem;
  letter-spacing:2px;
  text-transform:uppercase;
  opacity:0.7;
  cursor:pointer;
  transition:0.3s;
}

.btn-secondary:hover {
  opacity:1;
  border-color:var(--gold);
}

/* MOBILE */
@media(max-width:768px){
  .hero {
    flex-direction:column;
  }
  .hero-left {
    padding:40px 20px;
  }
}
</style>
</head>

<body>

<div class="hero">

  <!-- LEFT -->
  <div class="hero-left">

    <div class="tagline">
      — ARRIVE TO EVERYTHING
    </div>

    <h1>
      BagFree.<br/>
      Travel, <em>Redefined</em>.
    </h1>

    <p>
      Your essentials, curated and delivered to your hotel before you arrive.
      We take care of everything — so you don’t have to.
    </p>

    <div class="cta">
      <button class="btn-primary">Get Started</button>
      <button class="btn-secondary">Enter the Lounge →</button>
    </div>

  </div>

  <!-- RIGHT -->
  <div class="hero-right">
    <img src="hero.png" alt="Travel without luggage"/>
  </div>

</div>

</body>
</html>
