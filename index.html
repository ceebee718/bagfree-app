html{scroll-behavior:smooth}
body{font-family:var(--ff-body);background:var(--noir);color:var(--white);font-weight:300;overflow-x:hidden;}

/* ── MOBILE RESPONSIVE ───────────────────────────────────────── */
@media(max-width:768px){

  .bf-grid-3{grid-template-columns:1fr !important;}

  .bf-hotel-grid{grid-template-columns:1fr !important; gap:2rem !important;}

@media(max-width:480px){

// If you have real logo image URLs, set VALET_LOGO_URL / SNUGL_LOGO_URL above.

function VendorLogo({vendor, height=60, dark=false}) {
  const [errored, setErrored] = useState(false);
  const url = vendor.id === 'valet-by-nuor' ? VALET_LOGO_URL : SNUGL_LOGO_URL;
  const hasUrl = url && url !== null;

  // Styled text logo fallback (also used when image fails)
  if (!hasUrl || errored) {
    if (vendor.id === 'valet-by-nuor') {
      return (
        <div style={{lineHeight:1}}>
          <div style={{fontFamily:'var(--ff-display)',fontSize:'1.65rem',fontWeight:300,letterSpacing:'4px',textTransform:'uppercase',color:dark?'var(--gold-light)':'var(--noir)',lineHeight:1}}>

            By Nuor
          </div>
        </div>
      );
    }
    if (vendor.id === 'snugl') {
      return (
        <div style={{lineHeight:1}}>
          <div style={{fontFamily:'var(--ff-display)',fontSize:'1.8rem',fontWeight:300,letterSpacing:'5px',textTransform:'uppercase',color:'var(--gold)',lineHeight:1}}>
            SNUGL
          </div>
          <div style={{fontFamily:'var(--ff-body)',fontSize:'0.55rem',fontWeight:400,letterSpacing:'4px',textTransform:'uppercase',color:'rgba(201,169,110,0.5)',marginTop:5}}>
            Pod™ Collection
          </div>
        </div>
      );
    }
    return null;
  }

  return (
    <img
      src={url}
      alt={vendor.name}
      style={{height:height, width:'auto', objectFit:'contain', display:'block'}}
      onError={() => setErrored(true)}
    />
  );
}

function VendorCard({vendor:v, setPage, setActiveVendor}) {
  const isApply = v.color === 'apply';
  const isShop = v.url !== null;

  if (isApply) return (
    <div onClick={()=>setPage('supplier')}
      style={{background:'var(--noir-2)',padding:'2.5rem',cursor:'pointer',border:'1px dashed rgba(201,169,110,0.25)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',textAlign:'center',minHeight:280,transition:'all 0.25s'}}
      onMouseEnter={e=>e.currentTarget.style.background='var(--noir-3)'}
      onMouseLeave={e=>e.currentTarget.style.background='var(--noir-2)'}>
      <div style={{fontSize:'2.5rem',color:'var(--border-hi)',marginBottom:'1rem',fontWeight:100}}>+</div>
      <div style={{fontFamily:'var(--ff-display)',fontSize:'1.4rem',fontWeight:300,color:'var(--mist)',marginBottom:'0.5rem'}}>Your Brand Here</div>
      <div style={{fontSize:'0.72rem',letterSpacing:'2px',textTransform:'uppercase',color:'var(--gold)',marginBottom:'1rem'}}>Open Supplier Slot</div>
      <div style={{fontSize:'0.78rem',color:'var(--mist)',lineHeight:1.7,maxWidth:260}}>{v.desc}</div>
      <div style={{marginTop:'1.5rem',fontSize:'0.65rem',letterSpacing:'2.5px',textTransform:'uppercase',color:'var(--gold)',border:'1px solid var(--border-hi)',padding:'0.5rem 1.25rem'}}>Apply to Join →</div>
    </div>
  );

  const isLogoVendor = v.id === 'valet-by-nuor' || v.id === 'snugl';

  return (
    <div
      style={{background:v.highlight?'var(--noir-3)':'var(--noir-2)',padding:'2.5rem',cursor:'pointer',position:'relative',transition:'background 0.25s',display:'flex',flexDirection:'column'}}
      onMouseEnter={e=>e.currentTarget.style.background='var(--noir-4)'}
      onMouseLeave={e=>e.currentTarget.style.background=v.highlight?'var(--noir-3)':'var(--noir-2)'}
      onClick={()=>isShop?window.open(v.url,'_blank'):null}>
      {(v.highlight || v.id==='snugl') && (
        <div style={{position:'absolute',top:'1.25rem',right:'1.25rem',fontSize:'0.55rem',letterSpacing:'1.5px',textTransform:'uppercase',color:'var(--gold)',border:'1px solid var(--border-hi)',padding:'3px 10px',background:'rgba(201,169,110,0.08)'}}>Official Partner</div>
      )}
      <div style={{marginBottom:'1.25rem',minHeight:'3rem',display:'flex',alignItems:'center'}}>
        {isLogoVendor
          ? <VendorLogo vendor={v} height={v.id==='snugl'?72:60} dark={true} />
          : <span style={{fontSize:'2.5rem',opacity:0.25}}>{v.icon}</span>
        }
      </div>
      {/* Only show name as text for non-logo vendors; logo vendors show name via the logo component */}
      {!isLogoVendor && (
        <div style={{fontFamily:'var(--ff-display)',fontSize:'1.5rem',fontWeight:300,color:'var(--white)',marginBottom:'0.35rem'}}>{v.name}</div>
      )}
      {isLogoVendor && (
        <div style={{marginBottom:'0.35rem'}}/>
      )}
      <div style={{fontSize:'0.62rem',letterSpacing:'2px',textTransform:'uppercase',color:(v.highlight||v.id==='snugl')?'var(--gold)':'var(--mist)',marginBottom:'0.5rem'}}>{v.category}</div>
      <div style={{fontSize:'0.7rem',color:'var(--mist)',marginBottom:'1.25rem',letterSpacing:'0.5px'}}>{v.dest}</div>
      <p style={{fontSize:'0.82rem',color:'var(--mist)',lineHeight:1.8,marginBottom:'1.5rem',fontWeight:300}}>{v.desc}</p>
      {v.products.length > 0 && (
        <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:'1.5rem'}}>
          {v.products.map(p=>(
            <span key={p} style={{fontSize:'0.62rem',color:(v.highlight||v.id==='snugl')?'var(--gold-dim)':'var(--mist)',border:`1px solid ${(v.highlight||v.id==='snugl')?'var(--border)':'rgba(253,252,248,0.08)'}`,padding:'3px 10px',letterSpacing:'0.5px'}}>{p}</span>
          ))}
        </div>
      )}
      <div style={{marginTop:'auto'}}>
        {isShop ? (
          <button
            onClick={(e)=>{e.stopPropagation();window.open(v.url,'_blank');}}
            style={{background:'var(--gold)',color:'var(--noir)',padding:'0.75rem 1.75rem',border:'none',fontSize:'0.68rem',fontWeight:500,letterSpacing:'2.5px',textTransform:'uppercase',width:'100%',cursor:'pointer',fontFamily:'var(--ff-body)'}}>
            Shop {v.name} ↗
          </button>
        ) : (
          <button
            onClick={(e)=>{e.stopPropagation();setPage('supplier');}}
            style={{background:'transparent',color:'var(--gold)',padding:'0.75rem 1.75rem',border:'1px solid var(--border-hi)',fontSize:'0.68rem',fontWeight:400,letterSpacing:'2.5px',textTransform:'uppercase',width:'100%',cursor:'pointer',transition:'all 0.2s',fontFamily:'var(--ff-body)'}}

            Apply to List Your Brand →
          </button>
        )}
      </div>
    </div>
  );

function ProductsPage({setPage}) {
  const [cat, setCat] = useState('all');
  const [search, setSearch] = useState('');
  const [selected, setSelected] = useState(null);

  const filtered = PRODUCTS.filter(p => {
    if (cat !== 'all' && p.category !== cat) return false;
    if (search && !p.name.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  if (selected) return <ProductDetail product={selected} onBack={()=>setSelected(null)}/>;

  return (
    <div style={{paddingTop:80}}>
      <div style={{padding:'1.5rem 2.5rem',background:'var(--noir-2)',borderBottom:'1px solid var(--border)',display:'flex',gap:'1rem',flexWrap:'wrap',alignItems:'center'}}>

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState(() => {
    const h = window.location.hash.replace('#','');
    return h || 'home';
  });
  const [activeVendor, setActiveVendor] = useState('valet-by-nuor');

  function navigate(p) {
    window.location.hash = p;
    setPage(p);
    window.scrollTo(0,0);
  }

  React.useEffect(()=>{
    function onPop(){
      const h = window.location.hash.replace('#','');
      setPage(h||'home');
      window.scrollTo(0,0);
    }
    window.addEventListener('popstate', onPop);
    return () => window.removeEventListener('popstate', onPop);
  },[]);

  return (
    <>
      <Nav page={page} setPage={navigate}/>
      {page==='home' && <Home setPage={navigate}/>}
      {page==='vendors' && <VendorMarketplace setPage={navigate} setActiveVendor={setActiveVendor}/>}
      {page==='products' && <ProductsPage setPage={navigate}/>}
      {page==='hotel' && <HotelConcierge/>}
      {page==='supplier' && <SupplierPortal/>}
      <footer style={{background:'var(--noir-2)',padding:'2rem 3rem',display:'flex',justifyContent:'space-between',alignItems:'center',borderTop:'1px solid var(--border)',flexWrap:'wrap',gap:'1rem'}}>
        <div style={{fontFamily:'var(--ff-display)',fontSize:'1.2rem',fontWeight:300,letterSpacing:'3px',textTransform:'uppercase'}}>Bag<span style={{color:'var(--gold)'}}>Free</span></div>
        <div style={{fontSize:'0.68rem',color:'var(--mist)',letterSpacing:'1px'}}>
          Powered by Valet By Nuor · <a href="https://valetbynuor.com" target="_blank" style={{color:'var(--gold)',textDecoration:'none'}}>valetbynuor.com</a> · (813) 816-2448
        </div>
        <div style={{fontSize:'0.65rem',color:'var(--mist)'}}>© 2026 BagFree · All rights reserved</div>
      </footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<script>
(function () {
  const promo = document.getElementById('promoBanner');
  if (!promo) return;
  let lastY = window.scrollY;
  let dismissed = false;
  const collapseAt = 24;

  function collapsePromo() {
    if (dismissed) return;
    promo.classList.add('is-collapsed');
  }
  function expandPromo() {
    if (dismissed) return;
    promo.classList.remove('is-collapsed');
  }

  window.addEventListener('scroll', function () {
    const y = window.scrollY;
    const scrollingDown = y > lastY;
    if (y <= 4) { expandPromo(); }
    else if (scrollingDown && y > collapseAt) { collapsePromo(); }
    else if (!scrollingDown) { expandPromo(); }
    lastY = y;
  }, { passive: true });

  const dismissBtn = promo.querySelector('.promo-dismiss');
  if (dismissBtn) {
    dismissBtn.addEventListener('click', function (event) {
      event.preventDefault();
      event.stopPropagation();
      dismissed = true;
      promo.style.display = 'none';
    });
  }
})();
</script>
