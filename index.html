// If you have real logo image URLs, set VALET_LOGO_URL / SNUGL_LOGO_URL above.

function VendorLogo({vendor, height=60, dark=false}) {
  const [errored, setErrored] = useState(false);
  const url = vendor.id === 'valet-by-nuor' ? VALET_LOGO_URL : SNUGL_LOGO_URL;
  const hasUrl = url && url !== null;

  // Styled text logo fallback (also used when image fails)
  if (!hasUrl || errored) {
    if (vendor.id === 'valet-by-nuor') {
      return (
        <div style={{lineHeight:1}}>
          <div style={{fontFamily:'var(--ff-display)',fontSize:'1.65rem',fontWeight:300,letterSpacing:'4px',textTransform:'uppercase',color:dark?'var(--gold-light)':'var(--noir)',lineHeight:1}}>
            Valet
          </div>
          <div style={{fontFamily:'var(--ff-display)',fontSize:'0.7rem',fontWeight:300,letterSpacing:'6px',textTransform:'uppercase',color:dark?'rgba(201,169,110,0.6)':'rgba(10,10,8,0.45)',marginTop:4}}>
            By Nuor
          </div>
        </div>
      );
    }
    if (vendor.id === 'snugl') {
      return (
        <div style={{lineHeight:1}}>
          <div style={{fontFamily:'var(--ff-display)',fontSize:'1.8rem',fontWeight:300,letterSpacing:'5px',textTransform:'uppercase',color:'var(--gold)',lineHeight:1}}>
            SNUGL
          </div>
          <div style={{fontFamily:'var(--ff-body)',fontSize:'0.55rem',fontWeight:400,letterSpacing:'4px',textTransform:'uppercase',color:'rgba(201,169,110,0.5)',marginTop:5}}>
            Pod™ Collection
          </div>
        </div>
      );
    }
    return null;
  }

  return (
    <img
      src={url}
      alt={vendor.name}
      style={{height:height, width:'auto', objectFit:'contain', display:'block'}}
      onError={() => setErrored(true)}
    />
  );
}

      {/* COST COMPARISON */}
      <div style={{padding:'5rem 3rem',background:'var(--noir)'}}>
        <div style={{maxWidth:860,margin:'0 auto'}}>
          {/* Heading */}
          <div style={{textAlign:'center',marginBottom:'2.5rem'}}>
            <div style={{fontSize:'0.52rem',letterSpacing:'4px',textTransform:'uppercase',color:'var(--gold)',marginBottom:'0.75rem'}}>The real math</div>
            <h2 style={{fontFamily:'var(--ff-display)',fontSize:'clamp(2.2rem,4vw,3.8rem)',fontWeight:300,lineHeight:1.1,marginBottom:'0.85rem'}}>
              What does luggage <em style={{color:'var(--gold)',fontStyle:'italic'}}>actually</em> cost you?
            </h2>
            <p style={{fontSize:'0.78rem',color:'var(--mist)',lineHeight:1.85,maxWidth:440,margin:'0 auto'}}>Most travelers never add it up. When you do, the number is surprising.</p>
          </div>

          {/* Controls */}
          <div style={{display:'flex',gap:'0.75rem',justifyContent:'center',flexWrap:'wrap',marginBottom:'2rem'}}>
            {[
              {id:'hp-days',label:'Trip duration',opts:[['3','3 days'],['5','5 days'],['7','7 days'],['10','10 days'],['14','14 days']],def:'7'},
              {id:'hp-style',label:'Travel style',opts:[['luxury','Luxury'],['leisure','Leisure'],['business','Business'],['wellness','Wellness']],def:'leisure'},
            ].map(f=>(
              <div key={f.id} style={{display:'flex',flexDirection:'column',gap:4}}>
                <label style={{fontSize:'0.6rem',letterSpacing:'2px',textTransform:'uppercase',color:'var(--gold)'}}>{f.label}</label>
                <select id={f.id} defaultValue={f.def} onChange={(e)=>{window._hpState=window._hpState||{};window._hpState[f.id]=e.target.value;hpCalc();}}
                  style={{background:'var(--noir-2)',border:'1px solid var(--border)',color:'var(--white)',padding:'0.55rem 1rem',fontSize:'0.9rem',fontFamily:'var(--ff-body)',outline:'none',cursor:'pointer',minWidth:140,colorScheme:'dark'}}>
                  {f.opts.map(([v,l])=><option key={v} value={v} style={{background:'#1A1A17',color:'#FDFCF8'}}>{l}</option>)}
                </select>
              </div>
            ))}
          </div>

          {/* Cards */}
          <div style={{display:'grid',gridTemplateColumns:'1fr auto 1fr',gap:0,alignItems:'stretch'}}>
            {/* Traditional */}
            <div style={{background:'rgba(226,75,74,0.04)',border:'1px solid rgba(226,75,74,0.18)',padding:'2.5rem',position:'relative'}}>
              <div style={{fontSize:'0.7rem',letterSpacing:'2.5px',textTransform:'uppercase',color:'rgba(226,75,74,0.9)',marginBottom:'1.5rem',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <div style={{display:'flex',alignItems:'center',gap:'0.5rem'}}>
                  <span style={{fontSize:'1rem'}}>🧳</span> Traveling with luggage
                </div>
                <button id="hiddenCostBtn" onClick={()=>{
                  const p=document.getElementById('hiddenCostPanel');
                  const b=document.getElementById('hiddenCostBtn');
                  const open=p.style.display==='none'||!p.style.display;
                  p.style.display=open?'block':'none';
                  b.style.background=open?'rgba(239,159,39,0.2)':'rgba(239,159,39,0.08)';
                  b.style.borderColor=open?'rgba(239,159,39,0.7)':'rgba(239,159,39,0.35)';
                }} title="See hidden costs of traveling with luggage" style={{background:'rgba(239,159,39,0.08)',border:'1px solid rgba(239,159,39,0.35)',color:'rgba(239,159,39,0.9)',padding:'3px 8px',fontSize:'0.55rem',letterSpacing:'1.5px',textTransform:'uppercase',cursor:'pointer',display:'flex',alignItems:'center',gap:'5px',fontFamily:'var(--ff-body)',transition:'all 0.2s',whiteSpace:'nowrap',flexShrink:0}}>
                  ⚠ Hidden costs
                </button>
              </div>

              {/* Hidden costs reveal panel */}
              <div id="hiddenCostPanel" style={{display:'none',background:'rgba(239,159,39,0.05)',border:'1px solid rgba(239,159,39,0.2)',marginBottom:'1.25rem',padding:'1rem'}}>
                <div style={{fontSize:'0.52rem',letterSpacing:'2px',textTransform:'uppercase',color:'rgba(239,159,39,0.8)',marginBottom:'0.85rem'}}>⚠ The costs you can't put a number on</div>
                {[
                  ['😤','Stress & anxiety','Packing the night before. Did you forget something? Will it fit? Will it go over weight?'],
                  ['⏱️','2+ hours of your life','Check-in queues, bag drop, baggage claim. Every. Single. Trip.'],
                  ['😩','Fatigue','Lugging heavy bags through airports, trains, hotels. You arrive exhausted.'],
                  ['✈️','Overhead bin wars','The silent panic boarding last. Will there be space for your carry-on?'],
                  ['🚻','Dragging bags everywhere','Bathroom, café, hotel lobby. Your bag goes everywhere you go.'],
                  ['📦','Lost or damaged bags','1 in 200 bags is lost or delayed. Airlines pay far less than items are worth.'],
                  ['🌡️','Wrong clothes for the weather','You packed for what you expected. Weather had other plans.'],
                  ['🏨','Late hotel arrivals','Waiting at 2pm with nowhere to put your bags.'],
                  ['💸','Airline fee surprises','The fee changed. The weight limit was lower. The scale said 23.2kg.'],
                ].map(([icon,title,desc],i)=>(
                  <div key={i} style={{display:'flex',gap:'0.75rem',padding:'0.55rem 0',borderBottom:'1px solid rgba(239,159,39,0.1)'}}>
                    <span style={{fontSize:'1rem',flexShrink:0}}>{icon}</span>
                    <div>
                      <div style={{fontSize:'0.72rem',color:'rgba(253,252,248,0.85)',fontWeight:500,marginBottom:2}}>{title}</div>
                      <div style={{fontSize:'0.65rem',color:'rgba(253,252,248,0.4)',lineHeight:1.6}}>{desc}</div>
                    </div>
                  </div>
                ))}
                <div style={{marginTop:'0.75rem',fontSize:'0.6rem',color:'rgba(239,159,39,0.55)',fontStyle:'italic',textAlign:'center'}}>None of these appear in the total above — but every traveler feels them.</div>
              </div>

              <div id="hp-trad-items"></div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginTop:'1.25rem',paddingTop:'1rem',borderTop:'1px solid rgba(253,252,248,0.1)'}}>
                <div style={{fontSize:'0.65rem',letterSpacing:'2px',textTransform:'uppercase',color:'rgba(253,252,248,0.35)'}}>Estimated total</div>
                <div id="hp-trad-total" style={{fontFamily:'var(--ff-display)',fontSize:'2.8rem',fontWeight:300,color:'rgba(226,75,74,0.9)'}}></div>
              </div>
              <div style={{fontSize:'0.7rem',color:'rgba(239,159,39,0.5)',marginTop:'0.6rem',textAlign:'right',fontStyle:'italic'}}>+ hidden costs not shown above ⚠</div>
            </div>

            {/* VS */}
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'0 1.5rem',gap:'0.85rem'}}>
              <div style={{fontFamily:'var(--ff-display)',fontSize:'2rem',fontWeight:300,color:'rgba(253,252,248,0.1)'}}>vs</div>
              <div style={{background:'rgba(93,202,165,0.1)',border:'1px solid rgba(93,202,165,0.3)',padding:'0.75rem 1rem',textAlign:'center'}}>
                <div id="hp-saving" style={{fontFamily:'var(--ff-display)',fontSize:'2.2rem',fontWeight:300,color:'var(--green)',lineHeight:1}}></div>
                <div style={{fontSize:'0.46rem',letterSpacing:'2px',textTransform:'uppercase',color:'rgba(93,202,165,0.7)',marginTop:3}}>you save</div>
              </div>
            </div>

            {/* BagFree */}
            <div style={{background:'rgba(201,169,110,0.05)',border:'1px solid rgba(201,169,110,0.28)',padding:'2.5rem'}}>
              <div style={{fontSize:'0.7rem',letterSpacing:'2.5px',textTransform:'uppercase',color:'var(--gold)',marginBottom:'1.5rem',display:'flex',alignItems:'center',gap:'0.5rem'}}>
                <span style={{fontSize:'1rem'}}>✦</span> Traveling BagFree
              </div>
              <div id="hp-bf-items"></div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginTop:'1.25rem',paddingTop:'1rem',borderTop:'1px solid rgba(253,252,248,0.1)'}}>
                <div style={{fontSize:'0.65rem',letterSpacing:'2px',textTransform:'uppercase',color:'rgba(253,252,248,0.35)'}}>Estimated total</div>
                <div id="hp-bf-total" style={{fontFamily:'var(--ff-display)',fontSize:'2.8rem',fontWeight:300,color:'var(--gold)'}}></div>
              </div>
            </div>
          </div>

          {/* CTA */}
          <div style={{display:'flex',gap:'0.85rem',justifyContent:'center',marginTop:'2.5rem',flexWrap:'wrap'}}>
            <button onClick={()=>window.open('/departure-lounge-landing','_self')}
              style={{background:'linear-gradient(135deg,var(--gold),#b8893e)',color:'var(--noir)',border:'none',padding:'0.85rem 2.2rem',fontSize:'0.68rem',fontWeight:500,letterSpacing:'2.5px',textTransform:'uppercase'}}>
              See How BagFree Works ✦
            </button>
            <button onClick={()=>window.open('https://valetbynuor.com','_blank')}
              style={{background:'transparent',color:'var(--mist)',border:'1px solid var(--border)',padding:'0.85rem 1.75rem',fontSize:'0.68rem',letterSpacing:'2px',textTransform:'uppercase'}}>
              Shop Kits ↗
            </button>
          </div>
        </div>
      </div>

      {/* VENDOR PREVIEW */}
      <div style={{
        padding:'6rem 3rem',
        position:'relative',
        overflow:'hidden',

function VendorMarketplace({setPage, setActiveVendor}) {
  const [atVendors, setAtVendors] = React.useState([]);
  const [loading, setLoading] = React.useState(true);

  React.useEffect(()=>{
    fetchApprovedVendors().then(v=>{ setAtVendors(v); setLoading(false); });
  },[]);

  // Static vendors (always shown) + approved Airtable vendors + apply slots
  const staticCore = VENDORS.filter(v => v.color !== 'apply');
  const applySlots = VENDORS.filter(v => v.color === 'apply');
  const allVendors = [...staticCore, ...atVendors, ...applySlots];

  return (
    <div style={{paddingTop:60}}>
      <div style={{padding:'5rem 3rem 4rem',background:'var(--gold)',position:'relative',overflow:'hidden'}}>
        <div style={{fontSize:'0.62rem',letterSpacing:'4px',textTransform:'uppercase',color:'rgba(10,10,8,0.5)',marginBottom:'1.25rem',display:'flex',alignItems:'center',gap:'1rem',position:'relative'}}>
          <span style={{width:24,height:1,background:'var(--noir)',opacity:0.3,display:'inline-block'}}/>BagFree Marketplace
        </div>
        <h1 style={{fontFamily:'var(--ff-display)',fontSize:'clamp(2.5rem,5vw,4.5rem)',fontWeight:300,color:'var(--noir)',letterSpacing:'-0.5px',position:'relative'}}>
          Our <em style={{fontStyle:'italic'}}>Supplier</em> Network
        </h1>
        <p style={{fontSize:'0.9rem',color:'rgba(10,10,8,0.6)',marginTop:'1rem',maxWidth:500,lineHeight:1.8,fontWeight:300,position:'relative'}}>Browse verified suppliers delivering to your destination. Click any vendor to explore their products.</p>
      </div>
      <div style={{padding:'3rem',background:'var(--noir)'}}>
        {loading ? (
          <div style={{textAlign:'center',padding:'3rem',color:'var(--mist)',fontSize:'0.78rem',letterSpacing:'2px',textTransform:'uppercase'}}>
            <div style={{animation:'pulse 1.5s ease-in-out infinite',display:'inline-block'}}>Loading suppliers...</div>
          </div>
        ) : (
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(340px,1fr))',gap:1,background:'var(--border)',border:'1px solid var(--border)'}}>
            {allVendors.map(v=>(
              <VendorCard key={v.id} vendor={v} setPage={setPage} setActiveVendor={setActiveVendor} />
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

  if (isApply) return (

      style={{background:'var(--noir-2)',padding:'2.5rem',cursor:'pointer',border:'1px dashed rgba(201,169,110,0.25)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',textAlign:'center',minHeight:280,transition:'all 0.25s'}}

              <div style={{display:'flex',flexDirection:'column',gap:4}}>

                <select value={form.port} onChange={e=>setForm(f=>({...f,port:e.target.value}))}

              <div style={{textAlign:'center',fontSize:'0.62rem',color:'rgba(253,252,248,0.25)',lineHeight:1.7}}>

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState(() => {
    const h = window.location.hash.replace('#','');
    return h || 'home';
  });
  const [activeVendor, setActiveVendor] = useState('valet-by-nuor');

  function navigate(p) {
    window.location.hash = p;
    setPage(p);
    window.scrollTo(0,0);
  }

  React.useEffect(()=>{
    function onPop(){
      const h = window.location.hash.replace('#','');
      setPage(h||'home');
      window.scrollTo(0,0);
    }
    window.addEventListener('popstate', onPop);
    return () => window.removeEventListener('popstate', onPop);
  },[]);

  return (
    <>
      <Nav page={page} setPage={navigate}/>
      {page==='home' && <Home setPage={navigate}/>}
      {page==='vendors' && <VendorMarketplace setPage={navigate} setActiveVendor={setActiveVendor}/>}
      {page==='products' && <ProductsPage setPage={navigate}/>}
      {page==='hotel' && <HotelConcierge/>}
      {page==='supplier' && <SupplierPortal/>}
      {page==='cruise' && <CruisePage setPage={navigate}/>}
      <footer style={{background:'var(--noir-2)',padding:'2rem 3rem',display:'flex',justifyContent:'space-between',alignItems:'center',borderTop:'1px solid var(--border)',flexWrap:'wrap',gap:'1rem'}}>
        <div style={{fontFamily:'var(--ff-display)',fontSize:'1.2rem',fontWeight:300,letterSpacing:'3px',textTransform:'uppercase'}}>Bag<span style={{color:'var(--gold)'}}>Free</span></div>
        <div style={{fontSize:'0.68rem',color:'var(--mist)',letterSpacing:'1px'}}>
          Powered by Valet By Nuor · <a href="https://valetbynuor.com" target="_blank" style={{color:'var(--gold)',textDecoration:'none'}}>valetbynuor.com</a> · (813) 816-2448
        </div>
        <div style={{fontSize:'0.65rem',color:'var(--mist)'}}>© 2026 BagFree · All rights reserved</div>
      </footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<script>
function hpCalc() {
  const s = window._hpState || {};
  const days  = parseInt(s['hp-days']  || document.getElementById('hp-days')?.value  || 7);
  const style = s['hp-style'] || document.getElementById('hp-style')?.value || 'leisure';

  // Traditional costs — vary by style
  const checked    = 140;
  const overweight = Math.round(140 * 0.2);
  const laundry    = days >= 7 ? 85 : days >= 5 ? 55 : 30;
  const forgotten  = days >= 7 ? 95 : 65;

  const preShopping = {
    luxury:   480,
    business: 280,
    leisure:  180,
    wellness: 220,
  }[style] || 180;

  const tradTotal = checked + overweight + laundry + forgotten + preShopping;

  // BagFree costs
  const kits     = { luxury:480, leisure:220, business:320, wellness:280 };
  const curators = { luxury:280, leisure:130, business:180, wellness:140 };
  const kitPrice = kits[style]    || 220;
  const curator  = curators[style] || 130;
  const delivery = 35;
  const bfTotal  = kitPrice + curator + delivery;
  const saving   = tradTotal - bfTotal;

  const kitNames = { luxury:'Luxury Wardrobe Kit', leisure:'Stay Fresh Kit', business:'Business Travel Kit', wellness:'Wellness Travel Kit' };
  const shopLabels = {
    luxury:   'Pre-trip shopping (clothes, toiletries, accessories)',
    business: 'Pre-trip shopping (shirts, shoes, grooming)',
    leisure:  'Pre-trip shopping (clothes, sunscreen, toiletries)',
    wellness: 'Pre-trip shopping (activewear, supplements, gear)',
  };

  function row(label, val, color) {
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:0.65rem 0;border-bottom:1px solid rgba(253,252,248,0.05);gap:1rem">
      <span style="font-size:1rem;color:rgba(253,252,248,0.65);flex:1">${label}</span>
      <span style="font-size:1.05rem;font-weight:500;color:${color};white-space:nowrap">${val}</span>
    </div>`;
  }

  const tradEl = document.getElementById('hp-trad-items');
  if (tradEl) tradEl.innerHTML =
    row('Checked bag fee (round trip)', '$'+checked, 'rgba(226,75,74,0.9)') +
    row('Overweight bag risk', '$'+overweight, 'rgba(226,75,74,0.9)') +
    row(shopLabels[style] || shopLabels.leisure, '$'+preShopping, 'rgba(226,75,74,0.9)') +
    row('Hotel laundry ('+days+' days)', '$'+laundry, 'rgba(226,75,74,0.9)') +
    row('Forgotten & replacement items', '$'+forgotten, 'rgba(226,75,74,0.9)');

  const bfEl = document.getElementById('hp-bf-items');
  if (bfEl) bfEl.innerHTML =
    row('Checked bag fee', '$0', 'var(--green)') +
    row('Pre-trip shopping', '$0', 'var(--green)') +
    row('Hotel laundry', '$0', 'var(--green)') +
    row('Forgotten items', '$0', 'var(--green)') +
    row(kitNames[style]+' · Valet by Nuor', '$'+kitPrice, 'var(--gold)') +
    row('Local curator curation', '$'+curator, 'var(--gold)') +
    row('Hotel delivery fee', '$'+delivery, 'var(--gold)');

  const tt = document.getElementById('hp-trad-total');
  if (tt) tt.textContent = '$'+tradTotal;
  const bt = document.getElementById('hp-bf-total');
  if (bt) bt.textContent = '$'+bfTotal;
  const sv = document.getElementById('hp-saving');
  if (sv) sv.textContent = saving > 0 ? '$'+saving : '—';
}
// Run on load and re-run whenever React re-mounts the cost section
window.hpCalc = hpCalc;
setTimeout(hpCalc, 1200);
setTimeout(hpCalc, 2500);

// Watch for the cost comparison elements appearing after React navigation
const _hpObserver = new MutationObserver(() => {
  const el = document.getElementById('hp-trad-items');
  if (el && el.innerHTML === '') {
    hpCalc();
  }
});
_hpObserver.observe(document.body, { childList: true, subtree: true });
</script>
</body>
