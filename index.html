<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --noir:#0A0A08;
  --noir-2:#111110;
  --noir-3:#1A1A17;
  --noir-4:#242420;
  --gold:#C9A96E;
  --gold-light:#E8D5B0;
  --gold-dim:#8A6F45;
  --gold-xlight:#F5EDD8;
  --white:#FDFCF8;
  --mist:rgba(253,252,248,0.5);
  --mist-low:rgba(253,252,248,0.15);
  --mist-xlow:rgba(253,252,248,0.06);
  --border:rgba(201,169,110,0.16);
  --border-hi:rgba(201,169,110,0.42);
  --ff-display:'Cormorant Garamond',Georgia,serif;
  --ff-body:'Jost',sans-serif;
  --green:#5DCAA5;
}
html{scroll-behavior:smooth}
body{font-family:var(--ff-body);background:var(--noir);color:var(--white);font-weight:300;overflow-x:hidden;}
button{font-family:var(--ff-body);cursor:pointer}
input,select,textarea{font-family:var(--ff-body)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--noir)}
::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:2px}
select option{background:#1A1A17!important;color:#FDFCF8!important}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* ── MOBILE RESPONSIVE ───────────────────────────────────────── */
@media(max-width:768px){

  /* Promo bar */
  

  /* Nav — hide text links, show hamburger */
  .bf-nav-links{display:none !important;}
  .bf-hamburger{display:block !important;}
  .bf-nav{padding:0.75rem 1.25rem !important;}

  /* Announcement bar */

  /* Sections — reduce horizontal padding */
  .bf-section-pad{padding-left:1.25rem !important; padding-right:1.25rem !important;}

  /* 3-col grids → 1 col on mobile */
  .bf-grid-3{grid-template-columns:1fr !important;}

  /* 2-col grids → 1 col on mobile */
  .bf-grid-2{grid-template-columns:1fr !important;}

  /* Hotel concierge form 2-col → 1 col */
  .bf-form-2col{grid-template-columns:1fr !important;}

  /* Departure lounge teaser 2-col → 1 col */
  .bf-lounge-grid{grid-template-columns:1fr !important; gap:2rem !important;}

  /* Lounge feature grid 4x2 → 2x4 stays, but icons grid 2-col is fine */

  /* Hotel section 2-col → 1 col */
  .bf-hotel-grid{grid-template-columns:1fr !important; gap:2rem !important;}

  /* Stats row — wrap */
  .bf-stats{gap:2rem !important; flex-wrap:wrap !important;}

  /* Caribbean cards margin fix */
  .bf-caribbean-panel{margin:0 -1.25rem -1.25rem -1.25rem !important; padding:2rem 1.25rem !important;}
}

@media(max-width:480px){
  .bf-nav{padding:0.65rem 1rem !important;}
  .bf-section-pad{padding-left:1rem !important; padding-right:1rem !important;}
}

@keyframes bfFadeUp{
  from{opacity:0;transform:translateY(28px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes bfHeroDrift{
  0%{transform:scale(1.04) translate3d(0,0,0)}
  100%{transform:scale(1.08) translate3d(-0.6%, -0.8%, 0)}
}


.bf-hero-primary,.bf-hero-secondary{transition:transform .22s ease,box-shadow .22s ease,background .22s ease,border-color .22s ease,opacity .22s ease,color .22s ease}
.bf-hero-primary:hover{transform:translateY(-2px);box-shadow:0 14px 34px rgba(201,169,110,0.18);background:linear-gradient(135deg,#d8b06a,#b8893e)}
.bf-hero-secondary:hover{transform:translateY(-2px);opacity:1;border-color:rgba(201,169,110,0.34);color:var(--white);background:rgba(253,252,248,0.03)}
.bf-trusted-row{display:flex;align-items:center;gap:.85rem;margin:-.25rem 0 2.25rem 0;color:rgba(253,252,248,0.56);font-size:.76rem;letter-spacing:1.1px;text-transform:uppercase}
.bf-trusted-dots{display:flex;align-items:center;gap:.45rem}
.bf-trusted-dots span{width:7px;height:7px;border-radius:50%;background:rgba(201,169,110,.82);box-shadow:0 0 0 1px rgba(201,169,110,.18)}
.bf-scroll-cue{position:absolute;left:50%;bottom:1.35rem;transform:translateX(-50%);z-index:4;display:flex;flex-direction:column;align-items:center;gap:.45rem;color:rgba(253,252,248,.56);font-size:.6rem;letter-spacing:3px;text-transform:uppercase;pointer-events:none}
.bf-scroll-cue-line{width:1px;height:34px;background:linear-gradient(to bottom,rgba(201,169,110,.82),rgba(201,169,110,0));animation:bfScrollCue 1.8s ease-in-out infinite}
@keyframes bfScrollCue{0%,100%{transform:translateY(0);opacity:.45}50%{transform:translateY(8px);opacity:1}}

</style>

// If you have real logo image URLs, set VALET_LOGO_URL / SNUGL_LOGO_URL above.
// Otherwise this renders a styled text logo automatically.
function VendorLogo({vendor, height=60, dark=false}) {
  const [errored, setErrored] = useState(false);
  const url = vendor.id === 'valet-by-nuor' ? VALET_LOGO_URL : SNUGL_LOGO_URL;
  const hasUrl = url && url !== null;

  // Styled text logo fallback (also used when image fails)
  if (!hasUrl || errored) {
    if (vendor.id === 'valet-by-nuor') {
      return (
        <div style={{lineHeight:1}}>
          <div style={{fontFamily:'var(--ff-display)',fontSize:'1.65rem',fontWeight:300,letterSpacing:'4px',textTransform:'uppercase',color:dark?'var(--gold-light)':'var(--noir)',lineHeight:1}}>
            Valet
          </div>
          <div style={{fontFamily:'var(--ff-display)',fontSize:'0.7rem',fontWeight:300,letterSpacing:'6px',textTransform:'uppercase',color:dark?'rgba(201,169,110,0.6)':'rgba(10,10,8,0.45)',marginTop:4}}>
            By Nuor
          </div>
        </div>
      );
    }
    if (vendor.id === 'snugl') {
      return (
        <div style={{lineHeight:1}}>
          <div style={{fontFamily:'var(--ff-display)',fontSize:'1.8rem',fontWeight:300,letterSpacing:'5px',textTransform:'uppercase',color:'var(--gold)',lineHeight:1}}>
            SNUGL
          </div>
          <div style={{fontFamily:'var(--ff-body)',fontSize:'0.55rem',fontWeight:400,letterSpacing:'4px',textTransform:'uppercase',color:'rgba(201,169,110,0.5)',marginTop:5}}>
            Pod™ Collection
          </div>
        </div>
      );
    }
    return null;
  }

  return (
    <img
      src={url}
      alt={vendor.name}
      style={{height:height, width:'auto', objectFit:'contain', display:'block'}}
      onError={() => setErrored(true)}
    />
  );
}

// ── HOME ──────────────────────────────────────────────────────────────────────
function Home({setPage}) {
  const heroImageRef = React.useRef(null);
  const heroContentRef = React.useRef(null);

  React.useEffect(() => {
    const onScroll = () => {
      const y = Math.min(window.scrollY || 0, 320);
      if (heroImageRef.current) {
        heroImageRef.current.style.transform = `scale(1.04) translate3d(0, ${y * 0.08}px, 0)`;
      }
      if (heroContentRef.current) {
        heroContentRef.current.style.transform = `translate3d(0, ${y * 0.035}px, 0)`;
        heroContentRef.current.style.opacity = String(Math.max(0.72, 1 - y / 900));
      }
    };
    onScroll();
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  return (
    <div style={{paddingTop:60}}>


      <div style={{minHeight:'100vh',position:'relative',overflow:'hidden',display:'flex',alignItems:'stretch'}}>
        <div style={{position:'relative',zIndex:2,background:'var(--noir)',display:'flex',alignItems:'center',width:'50%',flexShrink:0}}>
          <div ref={heroContentRef} style={{padding:'10rem 5rem 6rem 6rem',width:'100%',transition:'transform 180ms ease-out, opacity 180ms ease-out',willChange:'transform, opacity',animation:'bfFadeUp 900ms ease-out'}}>
            <div style={{fontSize:'0.62rem',letterSpacing:'5px',textTransform:'uppercase',color:'var(--gold)',marginBottom:'2rem',display:'flex',alignItems:'center',gap:'1rem'}}>
              <span style={{width:32,height:1,background:'var(--gold)',display:'inline-block'}}></span>
              <span>Arrive to everything</span>
            </div>
            <h1 style={{fontFamily:'var(--ff-display)',fontSize:'clamp(3.2rem,5vw,5.8rem)',fontWeight:300,lineHeight:0.95,letterSpacing:'-2.9px',marginBottom:'1.65rem',color:'var(--white)',maxWidth:560}}>
              BagFree.<br />Travel, <em style={{fontStyle:'italic',color:'var(--gold)'}}>Redefined.</em>
            </h1>
            <p style={{fontSize:'1.02rem',color:'rgba(253,252,248,0.76)',lineHeight:1.95,maxWidth:430,marginBottom:'2.15rem',fontWeight:300}}>
              Your essentials, curated and delivered to your hotel before you arrive. We take care of everything — so you don’t have to.
            </p>
            <div style={{display:'flex',flexDirection:'column',gap:'0.65rem',marginBottom:'2.05rem'}}>
              {['No luggage to check or carry','No waiting at baggage claim','Everything waiting at arrival','Same-day delivery — Tampa & Orlando'].map((t, i) => (
                <div key={i} style={{display:'flex',alignItems:'center',gap:'0.85rem',fontSize:'0.9rem',color:'rgba(253,252,248,0.65)'}}>
                  <span style={{color:'var(--gold)',fontSize:'0.8rem',flexShrink:0}}>✓</span>
                  <span>{t}</span>
                </div>
              ))}
            </div>
            <div style={{display:'flex',gap:'1rem',flexWrap:'wrap',marginTop:'1.75rem',marginBottom:'1.15rem'}}>
              <button className="bf-hero-primary" onClick={() => setPage('vendors')} style={{background:'linear-gradient(135deg,var(--gold),#b8893e)',color:'var(--noir)',padding:'1.1rem 2.8rem',border:'none',fontSize:'0.75rem',fontWeight:600,letterSpacing:'3px',textTransform:'uppercase',cursor:'pointer',fontFamily:'var(--ff-body)'}}>
                Get Started
              </button>
              <button className="bf-hero-secondary" onClick={() => window.open('/departure-lounge-landing','_self')} style={{background:'rgba(253,252,248,0.01)',color:'rgba(253,252,248,0.76)',padding:'1.1rem 2.2rem',border:'1.5px solid rgba(253,252,248,0.2)',fontSize:'0.75rem',letterSpacing:'2.5px',textTransform:'uppercase',cursor:'pointer',fontFamily:'var(--ff-body)',opacity:0.82}}>
                Enter the Lounge ↗
              </button>
            </div>
            <div className="bf-trusted-row">
              <div className="bf-trusted-dots"><span></span><span></span><span></span></div>
              <span>Trusted by travelers in Tampa & Orlando</span>
            </div>
            <div className="bf-stats" style={{display:'flex',gap:'3.5rem',paddingTop:'2rem',borderTop:'1px solid rgba(253,252,248,0.12)',flexWrap:'wrap'}}>
              {[['38+','Products'],['6','Destinations'],['Same-Day','Tampa & Orlando'],['Valet By Nuor','Partner']].map(([n, l]) => (
                <div key={l}>
                  <div style={{fontFamily:'var(--ff-display)',fontSize:'2rem',fontWeight:300,color:'var(--gold)',lineHeight:1}}>{n}</div>
                  <div style={{fontSize:'0.58rem',letterSpacing:'2px',textTransform:'uppercase',color:'rgba(253,252,248,0.4)',marginTop:5}}>{l}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
        <div style={{flex:1,position:'relative',overflow:'hidden',background:'var(--noir)'}}>
          <img ref={heroImageRef} src={window.__HERO_IMG__} alt="BagFree hero" style={{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover',objectPosition:'50% 20%',filter:'brightness(0.92) contrast(1.05)',transform:'scale(1.04)',transition:'transform 180ms ease-out',willChange:'transform',animation:'bfHeroDrift 16s ease-in-out infinite alternate'}} />
          <div style={{position:'absolute',inset:0,background:'linear-gradient(to right,rgba(10,10,8,0.78) 0%,rgba(10,10,8,0.55) 35%,rgba(10,10,8,0.18) 60%,transparent 80%)'}}></div>
          <div style={{position:'absolute',bottom:0,left:0,right:0,height:180,background:'linear-gradient(to top,var(--noir),transparent)'}}></div>
        </div>
        <div className="bf-scroll-cue">
          <span>Scroll</span>
          <span className="bf-scroll-cue-line"></span>
        </div>
      </div>

      <div style={{padding:'5rem 3rem',background:'var(--noir)'}}>
        <div style={{maxWidth:860,margin:'0 auto'}}>
          <div style={{textAlign:'center',marginBottom:'2.5rem'}}>
            <div style={{fontSize:'0.52rem',letterSpacing:'4px',textTransform:'uppercase',color:'var(--gold)',marginBottom:'0.75rem'}}>The real math</div>
            <h2 style={{fontFamily:'var(--ff-display)',fontSize:'clamp(2.2rem,4vw,3.8rem)',fontWeight:300,lineHeight:1.1,marginBottom:'0.85rem'}}>
              What does luggage <em style={{color:'var(--gold)',fontStyle:'italic'}}>actually</em> cost you?
            </h2>
            <p style={{fontSize:'0.78rem',color:'var(--mist)',lineHeight:1.85,maxWidth:440,margin:'0 auto'}}>Most travelers never add it up. When you do, the number is surprising.</p>
          </div>

          {/* Controls */}
          <div style={{display:'flex',gap:'0.75rem',justifyContent:'center',flexWrap:'wrap',marginBottom:'2rem'}}>
            {[
              {id:'hp-days',label:'Trip duration',opts:[['3','3 days'],['5','5 days'],['7','7 days'],['10','10 days'],['14','14 days']],def:'7'},
              {id:'hp-style',label:'Travel style',opts:[['luxury','Luxury'],['leisure','Leisure'],['business','Business'],['wellness','Wellness']],def:'leisure'},
            ].map(f=>(
              <div key={f.id} style={{display:'flex',flexDirection:'column',gap:4}}>
                <label style={{fontSize:'0.6rem',letterSpacing:'2px',textTransform:'uppercase',color:'var(--gold)'}}>{f.label}</label>
                <select id={f.id} defaultValue={f.def} onChange={(e)=>{window._hpState=window._hpState||{};window._hpState[f.id]=e.target.value;hpCalc();}}
                  style={{background:'var(--noir-2)',border:'1px solid var(--border)',color:'var(--white)',padding:'0.55rem 1rem',fontSize:'0.9rem',fontFamily:'var(--ff-body)',outline:'none',cursor:'pointer',minWidth:140,colorScheme:'dark'}}>
                  {f.opts.map(([v,l])=><option key={v} value={v} style={{background:'#1A1A17',color:'#FDFCF8'}}>{l}</option>)}
                </select>
              </div>
            ))}
          </div>

          {/* Cards */}
          <div style={{display:'grid',gridTemplateColumns:'1fr auto 1fr',gap:0,alignItems:'stretch'}}>
            {/* Traditional */}
            <div style={{background:'rgba(226,75,74,0.04)',border:'1px solid rgba(226,75,74,0.18)',padding:'2.5rem',position:'relative'}}>
              <div style={{fontSize:'0.7rem',letterSpacing:'2.5px',textTransform:'uppercase',color:'rgba(253,252,248,0.85)',marginBottom:'1.5rem',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <div style={{display:'flex',alignItems:'center',gap:'0.5rem'}}>
                  <span style={{fontSize:'1rem'}}>🧳</span> Traveling with luggage
                </div>
                <button id="hiddenCostBtn" onClick={()=>{
                  const p=document.getElementById('hiddenCostPanel');
                  const b=document.getElementById('hiddenCostBtn');
                  const open=p.style.display==='none'||!p.style.display;
                  p.style.display=open?'block':'none';
                  b.style.background=open?'rgba(239,159,39,0.2)':'rgba(239,159,39,0.08)';
                  b.style.borderColor=open?'rgba(239,159,39,0.7)':'rgba(239,159,39,0.35)';
                }} title="See hidden costs of traveling with luggage" style={{background:'rgba(239,159,39,0.08)',border:'1px solid rgba(239,159,39,0.35)',color:'rgba(239,159,39,0.9)',padding:'3px 8px',fontSize:'0.55rem',letterSpacing:'1.5px',textTransform:'uppercase',cursor:'pointer',display:'flex',alignItems:'center',gap:'5px',fontFamily:'var(--ff-body)',transition:'all 0.2s',whiteSpace:'nowrap',flexShrink:0}}>
                  ⚠ Hidden costs
                </button>
              </div>

              {/* Hidden costs reveal panel */}
              <div id="hiddenCostPanel" style={{display:'none',background:'rgba(239,159,39,0.05)',border:'1px solid rgba(239,159,39,0.2)',marginBottom:'1.25rem',padding:'1rem'}}>
                <div style={{fontSize:'0.52rem',letterSpacing:'2px',textTransform:'uppercase',color:'rgba(239,159,39,0.8)',marginBottom:'0.85rem'}}>⚠ The costs you can't put a number on</div>
                {[
                  ['◈','Stress & anxiety','Packing the night before. Did you forget something? Will it fit? Will it go over weight?'],
                  ['◷','2+ hours of your life','Check-in queues, bag drop, baggage claim. Every. Single. Trip.'],
                  ['◬','Fatigue','Lugging heavy bags through airports, trains, hotels. You arrive exhausted.'],
                  ['◁','Overhead bin wars','The silent panic boarding last. Will there be space for your carry-on?'],
                  ['⬡','Dragging bags everywhere','Bathroom, café, hotel lobby. Your bag goes everywhere you go.'],
                  ['◻','Lost or damaged bags','1 in 200 bags is lost or delayed. Airlines pay far less than items are worth.'],
                  ['◇','Wrong clothes for the weather','You packed for what you expected. Weather had other plans.'],
                  ['▷','Late hotel arrivals','Waiting at 2pm with nowhere to put your bags.'],
                  ['◦','Airline fee surprises','The fee changed. The weight limit was lower. The scale said 23.2kg.'],
                ].map(([icon,title,desc],i)=>(
                  <div key={i} style={{display:'flex',gap:'0.75rem',padding:'0.55rem 0',borderBottom:'1px solid rgba(239,159,39,0.1)'}}>
                    <span style={{fontSize:'0.9rem',flexShrink:0,color:'rgba(201,169,110,0.6)',fontWeight:300,lineHeight:1,marginTop:'2px'}}>{icon}</span>
                    <div>
                      <div style={{fontSize:'0.72rem',color:'rgba(253,252,248,0.85)',fontWeight:500,marginBottom:2}}>{title}</div>
                      <div style={{fontSize:'0.65rem',color:'rgba(253,252,248,0.4)',lineHeight:1.6}}>{desc}</div>
                    </div>
                  </div>
                ))}
                <div style={{marginTop:'0.75rem',fontSize:'0.6rem',color:'rgba(239,159,39,0.55)',fontStyle:'italic',textAlign:'center'}}>None of these appear in the total above — but every traveler feels them.</div>

          <div style={{textAlign:'center',padding:'3rem',color:'var(--mist)',fontSize:'0.78rem',letterSpacing:'2px',textTransform:'uppercase'}}>

function ProductsPage({setPage}) {
  const [cat, setCat] = useState('all');
  const [search, setSearch] = useState('');
  const [selected, setSelected] = useState(null);

  const filtered = PRODUCTS.filter(p => {
    if (cat !== 'all' && p.category !== cat) return false;
    if (search && !p.name.toLowerCase().includes(search.toLowerCase())) return false;
    return true;

  if (selected) return <ProductDetail product={selected} onBack={()=>setSelected(null)}/>;

  return (
    <div style={{paddingTop:60}}>

                <div style={{fontSize:'0.6rem',letterSpacing:'2px',textTransform:'uppercase',color:'var(--mist)',marginBottom:'0.4rem'}}>{l}</div>
                <input type={t} value={form[k]} onChange={e=>f(k,e.target.value)} style={{width:'100%',background:'var(--mist-xlow)',border:'1px solid var(--border)',color:'var(--white)',padding:'0.75rem 1rem',fontSize:'0.88rem',outline:'none'}}/>

            <input type="tel" value={form.phone} onChange={e=>f('phone',e.target.value)} style={{width:'100%',background:'var(--mist-xlow)',border:'1px solid var(--border)',color:'var(--white)',padding:'0.75rem 1rem',fontSize:'0.88rem',outline:'none'}}/>
          </div>
          <div>
            <div style={{fontSize:'0.6rem',letterSpacing:'2px',textTransform:'uppercase',color:'var(--mist)',marginBottom:'0.4rem'}}>Destination</div>
            <select value={form.dest} onChange={e=>f('dest',e.target.value)} style={{width:'100%',background:'var(--noir-3)',border:'1px solid var(--border)',color:form.dest?'var(--white)':'var(--mist)',padding:'0.75rem 1rem',fontSize:'0.88rem',outline:'none'}}>
              <option value="">Select destination...</option>
              {DESTINATIONS.map(d=><option key={d.id} value={d.name}>{d.name}, {d.state}</option>)}
              <option value="Other">Other</option>
            </select>
          </div>
          <div className="bf-form-2col" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1rem'}}>
            {[['checkin','Check-in'],['checkout','Check-out']].map(([k,l])=>(
              <div key={k}>
                <div style={{fontSize:'0.6rem',letterSpacing:'2px',textTransform:'uppercase',color:'var(--mist)',marginBottom:'0.4rem'}}>{l}</div>
                <input type="date" value={form[k]} onChange={e=>f(k,e.target.value)} style={{width:'100%',background:'var(--mist-xlow)',border:'1px solid var(--border)',color:'var(--white)',padding:'0.75rem 1rem',fontSize:'0.88rem',outline:'none',colorScheme:'dark'}}/>
              </div>
            ))}
          </div>
          <div className="bf-form-2col" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1rem'}}>
            <div>
              <div style={{fontSize:'0.6rem',letterSpacing:'2px',textTransform:'uppercase',color:'var(--mist)',marginBottom:'0.4rem'}}>Guests</div>
              <select value={form.guests} onChange={e=>f('guests',e.target.value)} style={{width:'100%',background:'var(--noir-3)',border:'1px solid var(--border)',color:'var(--white)',padding:'0.75rem 1rem',fontSize:'0.88rem',outline:'none'}}>
                {['1','2','3','4','5','6+'].map(n=><option key={n} value={n}>{n} {n==='1'?'guest':'guests'}</option>)}
              </select>
            </div>
            <div>
              <div style={{fontSize:'0.6rem',letterSpacing:'2px',textTransform:'uppercase',color:'var(--mist)',marginBottom:'0.4rem'}}>Budget / Night</div>
              <select value={form.budget} onChange={e=>f('budget',e.target.value)} style={{width:'100%',background:'var(--noir-3)',border:'1px solid var(--border)',color:form.budget?'var(--white)':'var(--mist)',padding:'0.75rem 1rem',fontSize:'0.88rem',outline:'none'}}>
                <option value="">Select...</option>
                <option value="under100">Under $100</option>
                <option value="100-200">$100 to $200</option>
                <option value="200-350">$200 to $350</option>
                <option value="350-500">$350 to $500</option>
                <option value="500+">$500+ luxury</option>
              </select>
            </div>
          </div>
          <div>
            <div style={{fontSize:'0.6rem',letterSpacing:'2px',textTransform:'uppercase',color:'var(--mist)',marginBottom:'0.75rem'}}>Trip Type</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}}>
              {[['leisure','Leisure'],['business','Business'],['family','Family'],['romantic','Romantic'],['wedding','Wedding'],['other','Other']].map(([v,l])=>(
                <div key={v} onClick={()=>f('type',v)} style={{padding:'0.75rem',border:`1px solid ${form.type===v?'var(--border-hi)':'var(--border)'}`,cursor:'pointer',fontSize:'0.75rem',color:form.type===v?'var(--white)':'var(--mist)',background:form.type===v?'var(--mist-xlow)':'transparent',textAlign:'center'}}>{l}</div>
              ))}
            </div>
          </div>
          <div>
            <div style={{fontSize:'0.6rem',letterSpacing:'2px',textTransform:'uppercase',color:'var(--mist)',marginBottom:'0.4rem'}}>Special Requests</div>
            <textarea value={form.requests} onChange={e=>f('requests',e.target.value)} rows={3} placeholder="Ocean view, pet-friendly, early check-in..." style={{width:'100%',background:'var(--mist-xlow)',border:'1px solid var(--border)',color:'var(--white)',padding:'0.75rem 1rem',fontSize:'0.85rem',outline:'none',resize:'vertical',fontFamily:'var(--ff-body)',lineHeight:1.7}}/>
          </div>
          <button
            onClick={async()=>{if(form.name&&form.email&&form.dest){await submitToFormspree({type:'HOTEL REQUEST',...form,source:'BagFree Hotel Concierge'});setDone(true);}}}
            style={{background:'var(--gold)',color:'var(--noir)',padding:'1rem',border:'none',fontSize:'0.72rem',fontWeight:500,letterSpacing:'3px',textTransform:'uppercase',opacity:(!form.name||!form.email||!form.dest)?0.4:1}}>
            Submit Hotel Request
          </button>
        </div>
      </div>
    </div>
  );
}

// ── SUPPLIER PORTAL ───────────────────────────────────────────────────────────
function SupplierPortal() {
  const [step, setStep] = useState(1);
  const [done, setDone] = useState(false);
  const [form, setForm] = useState({biz:'',contact:'',email:'',phone:'',website:'',category:'',destinations:[],description:'',model:'both',agreedToCommission:false,commissionPlan:'monthly'});

  function toggleDest(d) {
    setForm(f=>({...f,destinations:f.destinations.includes(d)?f.destinations.filter(x=>x!==d):[...f.destinations,d]}));
  }

  if (done) return (
    <div style={{paddingTop:60,minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',textAlign:'center',padding:'4rem 2rem',background:'var(--noir)'}}>
      <div style={{fontFamily:'var(--ff-display)',fontSize:'4rem',fontWeight:300,marginBottom:'1rem'}}>Application <em style={{color:'var(--gold)',fontStyle:'italic'}}>Received</em></div>
      <p style={{fontSize:'0.9rem',color:'var(--mist)',lineHeight:1.9,maxWidth:480,marginBottom:'1.5rem'}}>Thank you, <strong style={{color:'var(--white)'}}>{form.biz}</strong>. We will review your application and reach out to <strong style={{color:'var(--white)'}}>{form.email}</strong> within 3 business days.</p>
      <div style={{fontSize:'0.7rem',color:'var(--gold)',letterSpacing:'2px',textTransform:'uppercase'}}>BagFree Supplier Network · Fulfilled by Valet By Nuor</div>
    </div>
  );

  return (
    <div style={{paddingTop:60,minHeight:'100vh',background:'var(--noir)'}}>
      <div style={{padding:'4rem 3rem 3rem',background:'var(--gold)'}}>
        <div style={{fontSize:'0.62rem',letterSpacing:'4px',textTransform:'uppercase',color:'rgba(10,10,8,0.5)',marginBottom:'1rem'}}>Supplier Application</div>
        <h1 style={{fontFamily:'var(--ff-display)',fontSize:'clamp(2.5rem,5vw,4rem)',fontWeight:300,color:'var(--noir)'}}>Join the <em style={{fontStyle:'italic'}}>BagFree</em> Network</h1>
        <p style={{fontSize:'0.88rem',color:'rgba(10,10,8,0.6)',marginTop:'1rem',maxWidth:500,lineHeight:1.8,fontWeight:300}}>Reach bag-free travelers in Florida and Georgia. Delivery handled by Valet By Nuor.</p>
      </div>
      <div style={{maxWidth:700,margin:'0 auto',padding:'3rem 2rem'}}>
        <div style={{display:'flex',marginBottom:'3rem',border:'1px solid var(--border)'}}>
          {['Business Info','Products','Details'].map((s,i)=>(
            <div key={s}
              style={{flex:1,padding:'0.85rem',textAlign:'center',fontSize:'0.62rem',letterSpacing:'2px',textTransform:'uppercase',background:step===i+1?'var(--gold)':step>i+1?'var(--mist-xlow)':'transparent',color:step===i+1?'var(--noir)':'var(--mist)',borderRight:i<2?'1px solid var(--border)':'none',cursor:step>i+1?'pointer':'default'}}
              onClick={()=>step>i+1&&setStep(i+1)}>
              {i+1}. {s}
            </div>
          ))}
        </div>

        {step===1 && (
          <div style={{display:'flex',flexDirection:'column',gap:'1.1rem'}}>
            {[['biz','Business Name'],['contact','Contact Person'],['email','Email'],['phone','Phone'],['website','Website (optional)']].map(([k,l])=>(
              <div key={k}>
                <div style={{fontSize:'0.6rem',letterSpacing:'2px',textTransform:'uppercase',color:'var(--mist)',marginBottom:'0.4rem'}}>{l}</div>
                <input value={form[k]} onChange={e=>setForm({...form,[k]:e.target.value})} style={{width:'100%',background:'var(--mist-xlow)',border:'1px solid var(--border)',color:'var(--white)',padding:'0.75rem 1rem',fontSize:'0.88rem',outline:'none'}}/>
              </div>
            ))}
            <button onClick={()=>form.biz&&form.email&&setStep(2)} style={{background:'var(--gold)',color:'var(--noir)',padding:'1rem',border:'none',fontSize:'0.7rem',fontWeight:500,letterSpacing:'3px',textTransform:'uppercase',opacity:(!form.biz||!form.email)?0.4:1}}>Continue →</button>
          </div>
        )}

        {step===2 && (
          <div style={{display:'flex',flexDirection:'column',gap:'1.5rem'}}>
            <div>
              <div style={{fontSize:'0.6rem',letterSpacing:'2px',textTransform:'uppercase',color:'var(--mist)',marginBottom:'0.75rem'}}>Category</div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:8}}>
                {[["Men's Wear",'👔'],["Women's Wear",'👗'],['Wellness','💊'],['Baby & Family','🍼'],['Tech','📷'],['Other','✦']].map(([c,icon])=>(
                  <div key={c} onClick={()=>setForm({...form,category:c})} style={{padding:'0.75rem 1rem',border:`1px solid ${form.category===c?'var(--border-hi)':'var(--border)'}`,cursor:'pointer',fontSize:'0.78rem',color:form.category===c?'var(--white)':'var(--mist)',background:form.category===c?'var(--mist-xlow)':'transparent'}}>
                    {icon} {c}
                  </div>
                ))}
              </div>
            </div>
            <div>
              <div style={{fontSize:'0.6rem',letterSpacing:'2px',textTransform:'uppercase',color:'var(--mist)',marginBottom:'0.75rem'}}>Destinations</div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:8}}>
                {DESTINATIONS.map(d=>(
                  <div key={d.id} onClick={()=>toggleDest(d.id)} style={{padding:'0.75rem 1rem',border:`1px solid ${form.destinations.includes(d.id)?'var(--border-hi)':'var(--border)'}`,cursor:'pointer',fontSize:'0.78rem',color:form.destinations.includes(d.id)?'var(--white)':'var(--mist)',background:form.destinations.includes(d.id)?'var(--mist-xlow)':'transparent',display:'flex',alignItems:'center',gap:'0.5rem'}}>
                    {d.img} {d.name}
                  </div>
                ))}
              </div>
            </div>
            <div>
              <div style={{fontSize:'0.6rem',letterSpacing:'2px',textTransform:'uppercase',color:'var(--mist)',marginBottom:'0.5rem'}}>Model</div>
              <div style={{display:'flex',gap:8}}>
                {[['rent','Rent Only'],['own','Sell Only'],['both','Both']].map(([v,l])=>(
                  <div key={v} onClick={()=>setForm({...form,model:v})} style={{flex:1,padding:'0.75rem',border:`1px solid ${form.model===v?'var(--border-hi)':'var(--border)'}`,cursor:'pointer',fontSize:'0.72rem',color:form.model===v?'var(--white)':'var(--mist)',background:form.model===v?'var(--mist-xlow)':'transparent',textAlign:'center'}}>{l}</div>
                ))}
              </div>
            </div>
            <div style={{display:'flex',gap:'1rem'}}>
              <button onClick={()=>setStep(1)} style={{background:'transparent',color:'var(--mist)',padding:'0.9rem 1.5rem',border:'1px solid var(--border)',fontSize:'0.68rem',letterSpacing:'2px',textTransform:'uppercase'}}>Back</button>
              <button onClick={()=>form.category&&form.destinations.length>0&&setStep(3)} style={{flex:1,background:'var(--gold)',color:'var(--noir)',padding:'1rem',border:'none',fontSize:'0.7rem',fontWeight:500,letterSpacing:'3px',textTransform:'uppercase',opacity:(!form.category||form.destinations.length===0)?0.4:1}}>Continue →</button>
            </div>
          </div>
        )}

        {step===3 && (
          <div style={{display:'flex',flexDirection:'column',gap:'1.25rem'}}>
            <div>
              <div style={{fontSize:'0.6rem',letterSpacing:'2px',textTransform:'uppercase',color:'var(--mist)',marginBottom:'0.4rem'}}>Tell us about your products</div>
              <textarea value={form.description} onChange={e=>setForm({...form,description:e.target.value})} rows={5} placeholder="Describe your products and why you would be a great BagFree supplier..." style={{width:'100%',background:'var(--mist-xlow)',border:'1px solid var(--border)',color:'var(--white)',padding:'0.75rem 1rem',fontSize:'0.88rem',outline:'none',resize:'vertical',fontFamily:'var(--ff-body)',lineHeight:1.7}}/>
            </div>
            <div style={{padding:'1.1rem',background:'var(--mist-xlow)',border:'1px solid var(--border)',fontSize:'0.78rem',color:'var(--mist)',lineHeight:1.8}}>
              <span style={{color:'var(--gold)'}}>Logistics:</span> All BagFree suppliers integrate with Valet By Nuor for fulfillment across Florida and Georgia.
            </div>
            <div>
              <div style={{fontSize:'0.6rem',letterSpacing:'2px',textTransform:'uppercase',color:'var(--mist)',marginBottom:'0.75rem'}}>Commission Plan</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:'1rem'}}>
                <div onClick={()=>setForm({...form,commissionPlan:'monthly'})}
                  style={{padding:'1rem',border:`1px solid ${form.commissionPlan==='monthly'?'var(--border-hi)':'var(--border)'}`,cursor:'pointer',background:form.commissionPlan==='monthly'?'var(--mist-xlow)':'transparent',transition:'all 0.2s'}}>
                  <div style={{fontSize:'0.62rem',letterSpacing:'2px',textTransform:'uppercase',color:'var(--mist)',marginBottom:6}}>Month-to-Month</div>
                  <div style={{fontFamily:'var(--ff-display)',fontSize:'1.8rem',fontWeight:300,color:'var(--white)',lineHeight:1,marginBottom:4}}>15%</div>
                  <div style={{fontSize:'0.72rem',color:'var(--mist)',marginBottom:8}}>No upfront fee · No commitment</div>
                  <div style={{display:'flex',flexDirection:'column',gap:4}}>
                    {['Standard marketplace listing','No badge','Standard delivery priority','Not featured on home page'].map(b=>(
                      <div key={b} style={{display:'flex',gap:6,alignItems:'center',fontSize:'0.65rem',color:'var(--mist)'}}>
                        <span style={{color:'var(--mist)',fontSize:'0.6rem'}}>—</span>{b}
                      </div>
                    ))}
                  </div>
                </div>
                <div onClick={()=>setForm({...form,commissionPlan:'annual'})}
                  style={{padding:'1rem',border:`1px solid ${form.commissionPlan==='annual'?'var(--gold)':'var(--border)'}`,cursor:'pointer',background:form.commissionPlan==='annual'?'var(--mist-xlow)':'transparent',transition:'all 0.2s',position:'relative'}}>
                  <div style={{position:'absolute',top:'0.6rem',right:'0.6rem',fontSize:'0.55rem',letterSpacing:'1.5px',textTransform:'uppercase',color:'var(--gold)',border:'1px solid var(--border-hi)',padding:'2px 6px'}}>Best Value</div>
                  <div style={{fontSize:'0.62rem',letterSpacing:'2px',textTransform:'uppercase',color:'var(--mist)',marginBottom:6}}>Annual Partner</div>
                  <div style={{fontFamily:'var(--ff-display)',fontSize:'1.8rem',fontWeight:300,color:'var(--gold)',lineHeight:1,marginBottom:4}}>8%</div>
                  <div style={{fontSize:'0.72rem',color:'var(--mist)',marginBottom:8}}>$199/year · 12-month agreement</div>
                  <div style={{display:'flex',flexDirection:'column',gap:4}}>
                    {['Featured placement in marketplace','Verified Partner badge','Priority Valet By Nuor delivery','Listed on BagFree home page'].map(b=>(
                      <div key={b} style={{display:'flex',gap:6,alignItems:'center',fontSize:'0.65rem',color:'var(--gold-dim)'}}>
                        <span style={{color:'var(--gold)',fontSize:'0.6rem'}}>◆</span>{b}
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
            <div
              style={{padding:'1.25rem',background:'var(--mist-xlow)',border:`1px solid ${form.agreedToCommission?'var(--border-hi)':'var(--border)'}`,cursor:'pointer',transition:'border-color 0.2s'}}
              onClick={()=>setForm({...form,agreedToCommission:!form.agreedToCommission})}>
              <div style={{display:'flex',gap:'1rem',alignItems:'flex-start'}}>
                <div style={{width:20,height:20,border:`1px solid ${form.agreedToCommission?'var(--gold)':'var(--border-hi)'}`,background:form.agreedToCommission?'var(--gold)':'transparent',flexShrink:0,marginTop:2,display:'flex',alignItems:'center',justifyContent:'center',transition:'all 0.2s'}}>
                  {form.agreedToCommission && <span style={{color:'var(--noir)',fontSize:'0.75rem',fontWeight:700}}>✓</span>}
                </div>
                <div>
                  <div style={{fontSize:'0.78rem',color:'var(--white)',fontWeight:400,marginBottom:6}}>I agree to BagFree's commission structure</div>
                  <div style={{fontSize:'0.72rem',color:'var(--mist)',lineHeight:1.8}}>
                    {form.commissionPlan==='annual'
                      ? 'BagFree earns 8% commission on all sales plus a $199/year listing fee. Includes featured placement, Verified Partner badge, and home page listing. 12-month commitment.'
                      : 'BagFree earns 15% commission on all sales. No upfront fee, no commitment. Standard marketplace listing.'
                    } Valet By Nuor charges a separate delivery fee per order fulfilled.
                  </div>
                </div>
              </div>
            </div>
            <div style={{display:'flex',gap:'1rem'}}>
              <button onClick={()=>setStep(2)} style={{background:'transparent',color:'var(--mist)',padding:'0.9rem 1.5rem',border:'1px solid var(--border)',fontSize:'0.68rem',letterSpacing:'2px',textTransform:'uppercase'}}>Back</button>
              <button
                onClick={async()=>{
                  if(form.agreedToCommission){
                    await Promise.all([
                      submitToAirtable(form),
                      submitToFormspree({
                        type:'SUPPLIER APPLICATION',
                        ...form,
                        destinations:form.destinations.join(', '),
                        commissionPlan:form.commissionPlan==='annual'?'Annual Partner — $199/year + 8% commission':'Monthly — 15% commission, no commitment',
                        agreedToCommission:'Yes — commission terms acknowledged',
                        source:'BagFree Supplier Portal'
                      })
                    ]);
                    setDone(true);
                  }
                }}
                style={{flex:1,background:'var(--gold)',color:'var(--noir)',padding:'1rem',border:'none',fontSize:'0.7rem',fontWeight:500,letterSpacing:'3px',textTransform:'uppercase',opacity:!form.agreedToCommission?0.4:1}}>
                Submit Application
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

    const h = window.location.hash.replace('#','');
    return h || 'home';
  });
  const [activeVendor, setActiveVendor] = useState('valet-by-nuor');

  function navigate(p) {
    window.location.hash = p;
    setPage(p);
    window.scrollTo(0,0);
  }

  React.useEffect(()=>{
    function onPop(){
      const h = window.location.hash.replace('#','');
      setPage(h||'home');
      window.scrollTo(0,0);
    }
    window.addEventListener('popstate', onPop);
    return () => window.removeEventListener('popstate', onPop);
  },[]);

  return (
    <>
      <Nav page={page} setPage={navigate}/>
      {page==='home' && <Home setPage={navigate}/>}
      {page==='vendors' && <VendorMarketplace setPage={navigate} setActiveVendor={setActiveVendor}/>}
      {page==='products' && <ProductsPage setPage={navigate}/>}
      {page==='hotel' && <HotelConcierge/>}
      {page==='supplier' && <SupplierPortal/>}
      {page==='cruise' && <CruisePage setPage={navigate}/>}
      <footer style={{background:'var(--noir-2)',padding:'2rem 3rem',display:'flex',justifyContent:'space-between',alignItems:'center',borderTop:'1px solid var(--border)',flexWrap:'wrap',gap:'1rem'}}>
        <div style={{fontFamily:'var(--ff-display)',fontSize:'1.2rem',fontWeight:300,letterSpacing:'3px',textTransform:'uppercase'}}>Bag<span style={{color:'var(--gold)'}}>Free</span></div>
        <div style={{fontSize:'0.68rem',color:'var(--mist)',letterSpacing:'1px'}}>
          Powered by Valet By Nuor · <a href="https://valetbynuor.com" target="_blank" style={{color:'var(--gold)',textDecoration:'none'}}>valetbynuor.com</a> · (813) 816-2448
        </div>
        <div style={{fontSize:'0.65rem',color:'var(--mist)'}}>© 2026 BagFree · All rights reserved</div>
      </footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<script>
function hpCalc() {
  const s = window._hpState || {};
  const days  = parseInt(s['hp-days']  || document.getElementById('hp-days')?.value  || 7);
  const style = s['hp-style'] || document.getElementById('hp-style')?.value || 'leisure';

  // Traditional costs — vary by style
  const checked    = 140;
  const overweight = Math.round(140 * 0.2);
  const laundry    = days >= 7 ? 85 : days >= 5 ? 55 : 30;
  const forgotten  = days >= 7 ? 95 : 65;

  const preShopping = {
    luxury:   480,
    business: 280,
    leisure:  180,
    wellness: 220,
  }[style] || 180;

  const tradTotal = checked + overweight + laundry + forgotten + preShopping;

  // BagFree costs
  const kits     = { luxury:480, leisure:220, business:320, wellness:280 };
  const curators = { luxury:280, leisure:130, business:180, wellness:140 };
  const kitPrice = kits[style]    || 220;
  const curator  = curators[style] || 130;
  const delivery = 35;
  const bfTotal  = kitPrice + curator + delivery;
  const saving   = tradTotal - bfTotal;

  const kitNames = { luxury:'Luxury Wardrobe Kit', leisure:'Stay Fresh Kit', business:'Business Travel Kit', wellness:'Wellness Travel Kit' };
  const shopLabels = {
    luxury:   'Pre-trip shopping (clothes, toiletries, accessories)',
    business: 'Pre-trip shopping (shirts, shoes, grooming)',
    leisure:  'Pre-trip shopping (clothes, sunscreen, toiletries)',
    wellness: 'Pre-trip shopping (activewear, supplements, gear)',
  };

  function row(label, val, color) {
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:0.65rem 0;border-bottom:1px solid rgba(253,252,248,0.05);gap:1rem">
      <span style="font-size:1rem;color:rgba(253,252,248,0.65);flex:1">${label}</span>
      <span style="font-size:1.05rem;font-weight:500;color:${color};white-space:nowrap">${val}</span>
    </div>`;
  }

  const tradEl = document.getElementById('hp-trad-items');
  if (tradEl) tradEl.innerHTML =
    row('Checked bag fee (round trip)', '$'+checked, 'rgba(253,252,248,0.85)') +
    row('Overweight bag risk', '$'+overweight, 'rgba(253,252,248,0.85)') +
    row(shopLabels[style] || shopLabels.leisure, '$'+preShopping, 'rgba(253,252,248,0.85)') +
    row('Hotel laundry ('+days+' days)', '$'+laundry, 'rgba(253,252,248,0.85)') +
    row('Forgotten & replacement items', '$'+forgotten, 'rgba(253,252,248,0.85)');

  const bfEl = document.getElementById('hp-bf-items');
  if (bfEl) bfEl.innerHTML =
    row('Checked bag fee', '$0', 'var(--green)') +
    row('Pre-trip shopping', '$0', 'var(--green)') +
    row('Hotel laundry', '$0', 'var(--green)') +
    row('Forgotten items', '$0', 'var(--green)') +
    row(kitNames[style]+' · Valet by Nuor', '$'+kitPrice, 'var(--gold)') +
    row('Local curator curation', '$'+curator, 'var(--gold)') +
    row('Hotel delivery fee', '$'+delivery, 'var(--gold)');

  const tt = document.getElementById('hp-trad-total');
  if (tt) tt.textContent = '$'+tradTotal;
  const bt = document.getElementById('hp-bf-total');
  if (bt) bt.textContent = '$'+bfTotal;
  const sv = document.getElementById('hp-saving');
  if (sv) sv.textContent = saving > 0 ? '$'+saving : '—';
}
// Run on load and re-run whenever React re-mounts the cost section
window.hpCalc = hpCalc;
setTimeout(hpCalc, 1200);
setTimeout(hpCalc, 2500);

// Watch for the cost comparison elements appearing after React navigation
const _hpObserver = new MutationObserver(() => {
  const el = document.getElementById('hp-trad-items');
  if (el && el.innerHTML === '') {
    hpCalc();
  }
});
_hpObserver.observe(document.body, { childList: true, subtree: true });
</script>
</body>
