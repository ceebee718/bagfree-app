<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --noir:#0D1525;
  --noir-2:#111C30;
  --noir-3:#172138;
  --noir-4:#1E2D45;
  --gold:#C9A96E;
  --gold-light:#E8D5B0;
  --gold-dim:#8A6F45;
  --gold-xlight:#C9A96E;
  --white:#FDFCF8;
  --mist:rgba(253,252,248,0.5);
  --mist-low:rgba(253,252,248,0.15);
  --mist-xlow:rgba(253,252,248,0.06);
  --border:rgba(201,169,110,0.16);
  --border-hi:rgba(201,169,110,0.42);
  --ff-display:'Cormorant Garamond',Georgia,serif;
  --ff-body:'Jost',sans-serif;
  --green:#5DCAA5;
}
html{scroll-behavior:smooth}
body{font-family:var(--ff-body);background:var(--noir);color:var(--white);font-weight:300;overflow-x:hidden;}
button{font-family:var(--ff-body);cursor:pointer}
input,select,textarea{font-family:var(--ff-body)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--noir)}
::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:2px}
select option{background:#172138!important;color:#FDFCF8!important}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* ── MOBILE RESPONSIVE ───────────────────────────────────────── */
@media(max-width:768px){

  /* Hero — stack vertically on mobile */
  .bf-hero-wrap{flex-direction:column !important;}
  .bf-hero-left{width:100% !important;padding:5rem 1.5rem 2.5rem !important;}
  .bf-hero-right{width:100% !important;height:45vh !important;min-height:260px !important;flex-shrink:0 !important;}

  /* Promo bar */
  

  /* Nav — hide text links, show hamburger */
  .bf-nav-links{display:none !important;}
  .bf-hamburger{display:block !important;}
  .bf-nav{padding:0.75rem 1.25rem !important;}

  /* Announcement bar */

  /* Sections — reduce horizontal padding */
  .bf-section-pad{padding-left:1.25rem !important; padding-right:1.25rem !important;}

  /* 3-col grids → 1 col on mobile */
  .bf-grid-3{grid-template-columns:1fr !important;}

  /* 2-col grids → 1 col on mobile */
  .bf-grid-2{grid-template-columns:1fr !important;}

  /* Hotel concierge form 2-col → 1 col */
  .bf-form-2col{grid-template-columns:1fr !important;}

  /* Departure lounge teaser 2-col → 1 col */
  .bf-lounge-grid{grid-template-columns:1fr !important; gap:2rem !important;}

  /* Lounge feature grid 4x2 → 2x4 stays, but icons grid 2-col is fine */

  /* Hotel section 2-col → 1 col */
  .bf-hotel-grid{grid-template-columns:1fr !important; gap:2rem !important;}

  /* Stats row — wrap */
  .bf-stats{gap:2rem !important; flex-wrap:wrap !important;}

  /* Caribbean cards margin fix */
  .bf-caribbean-panel{margin:0 -1.25rem -1.25rem -1.25rem !important; padding:2rem 1.25rem !important;}
}

@media(max-width:480px){
  .bf-nav{padding:0.65rem 1rem !important;}
  .bf-section-pad{padding-left:1rem !important; padding-right:1rem !important;}
}

@keyframes bfFadeUp{
  from{opacity:0;transform:translateY(28px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes bfHeroDrift{
  0%{transform:scale(1.04) translate3d(0,0,0)}
  100%{transform:scale(1.08) translate3d(-0.6%, -0.8%, 0)}
}


.bf-hero-primary,.bf-hero-secondary{transition:transform .22s ease,box-shadow .22s ease,background .22s ease,border-color .22s ease,opacity .22s ease,color .22s ease}
.bf-hero-primary:hover{transform:translateY(-2px);box-shadow:0 14px 34px rgba(201,169,110,0.18);background:linear-gradient(135deg,#d8b06a,#b8893e)}
.bf-hero-secondary:hover{transform:translateY(-2px);opacity:1;border-color:rgba(201,169,110,0.34);color:var(--white);background:rgba(253,252,248,0.03)}
.bf-trusted-row{display:flex;align-items:center;gap:.85rem;margin:-.25rem 0 2.25rem 0;color:rgba(253,252,248,0.56);font-size:.76rem;letter-spacing:1.1px;text-transform:uppercase}
.bf-trusted-dots{display:flex;align-items:center;gap:.45rem}
.bf-trusted-dots span{width:7px;height:7px;border-radius:50%;background:rgba(201,169,110,.82);box-shadow:0 0 0 1px rgba(201,169,110,.18)}
.bf-scroll-cue{position:absolute;left:50%;bottom:1.35rem;transform:translateX(-50%);z-index:4;display:flex;flex-direction:column;align-items:center;gap:.45rem;color:rgba(253,252,248,.56);font-size:.6rem;letter-spacing:3px;text-transform:uppercase;pointer-events:none}
.bf-scroll-cue-line{width:1px;height:34px;background:linear-gradient(to bottom,rgba(201,169,110,.82),rgba(201,169,110,0));animation:bfScrollCue 1.8s ease-in-out infinite}
@keyframes bfScrollCue{0%,100%{transform:translateY(0);opacity:.45}50%{transform:translateY(8px);opacity:1}}

</style>

// ── LOGO COMPONENT ────────────────────────────────────────────────────────────
// If you have real logo image URLs, set VALET_LOGO_URL / SNUGL_LOGO_URL above.
// Otherwise this renders a styled text logo automatically.
function VendorLogo({vendor, height=60, dark=false}) {
  const [errored, setErrored] = useState(false);
  const url = vendor.id === 'valet-by-nuor' ? VALET_LOGO_URL : SNUGL_LOGO_URL;
  const hasUrl = url && url !== null;

  // Styled text logo fallback (also used when image fails)
  if (!hasUrl || errored) {
    if (vendor.id === 'valet-by-nuor') {
      return (
        <div style={{lineHeight:1}}>
          <div style={{fontFamily:'var(--ff-display)',fontSize:'1.65rem',fontWeight:300,letterSpacing:'4px',textTransform:'uppercase',color:dark?'var(--gold-light)':'var(--noir)',lineHeight:1}}>
            Valet
          </div>
          <div style={{fontFamily:'var(--ff-display)',fontSize:'0.82rem',fontWeight:300,letterSpacing:'6px',textTransform:'uppercase',color:dark?'rgba(201,169,110,0.6)':'rgba(8,14,26,0.45)',marginTop:4}}>
            By Nuor
          </div>
        </div>
      );
    }
    if (vendor.id === 'snugl') {
      return (
        <div style={{lineHeight:1}}>
          <div style={{fontFamily:'var(--ff-display)',fontSize:'1.8rem',fontWeight:300,letterSpacing:'5px',textTransform:'uppercase',color:'var(--gold)',lineHeight:1}}>
            SNUGL
          </div>
          <div style={{fontFamily:'var(--ff-body)',fontSize:'0.62rem',fontWeight:400,letterSpacing:'4px',textTransform:'uppercase',color:'rgba(201,169,110,0.5)',marginTop:5}}>
            Pod™ Collection
          </div>
        </div>
      );
    }
    return null;
  }

  return (
    <img
      src={url}
      alt={vendor.name}
      style={{height:height, width:'auto', objectFit:'contain', display:'block'}}
      onError={() => setErrored(true)}
    />
  );
}

// ── VENDOR MARKETPLACE ────────────────────────────────────────────────────────
function VendorMarketplace({setPage, setActiveVendor}) {
  const [atVendors, setAtVendors] = React.useState([]);
  const [loading, setLoading] = React.useState(true);

  React.useEffect(()=>{
    fetchApprovedVendors().then(v=>{ setAtVendors(v); setLoading(false); });
  },[]);

  // Static vendors (always shown) + approved Airtable vendors + apply slots
  const staticCore = VENDORS.filter(v => v.color !== 'apply');
  const applySlots = VENDORS.filter(v => v.color === 'apply');
  const activeCity = window._activeDestCity || null;

  // Filter vendors by destination — vendors with specific city dest only show for that city
  const filteredCore = staticCore.filter(v => {
    if (!activeCity) return true;
    // Gifts By Selena is Tampa Bay only
    if (v.id === 'gifts-by-selena') return activeCity === 'Tampa Bay';
    return true;
  });

  const allVendors = [...filteredCore, ...atVendors, ...applySlots];

  return (
    <div style={{paddingTop:60}}>
      <div style={{padding:'5rem 3rem 4rem',background:'var(--gold)',position:'relative',overflow:'hidden'}}>
        <div style={{fontSize:'0.72rem',letterSpacing:'4px',textTransform:'uppercase',color:'rgba(8,14,26,0.5)',marginBottom:'1.25rem',display:'flex',alignItems:'center',gap:'1rem',position:'relative'}}>

        </div>
        <h1 style={{fontFamily:'var(--ff-display)',fontSize:'clamp(2.5rem,5vw,4.5rem)',fontWeight:300,color:'var(--noir)',letterSpacing:'-0.5px',position:'relative'}}>
          Our <em style={{fontStyle:'italic'}}>Supplier</em> Network
        </h1>
        <p style={{fontSize:'1.02rem',color:'rgba(8,14,26,0.6)',marginTop:'1rem',maxWidth:500,lineHeight:1.8,fontWeight:300,position:'relative'}}>Browse verified suppliers delivering to your destination. Click any vendor to explore their products.</p>
        {activeCity && (
          <div style={{display:'inline-flex',alignItems:'center',gap:'0.75rem',marginTop:'1rem',background:'rgba(8,14,26,0.15)',border:'1px solid rgba(8,14,26,0.25)',padding:'0.4rem 0.85rem',position:'relative'}}>
            <span style={{fontSize:'0.62rem',letterSpacing:'2px',textTransform:'uppercase',color:'rgba(8,14,26,0.7)'}}>Showing vendors for {activeCity}</span>
            <span onClick={()=>{window._activeDestCity=null;setPage('vendors');}} style={{fontSize:'0.70rem',color:'rgba(8,14,26,0.5)',cursor:'pointer',marginLeft:'0.25rem'}}>✕ Clear</span>
          </div>
        )}
      </div>
      <div style={{padding:'3rem',background:'var(--noir)'}}>
        {loading ? (
          <div style={{textAlign:'center',padding:'3rem',color:'var(--mist)',fontSize:'0.90rem',letterSpacing:'2px',textTransform:'uppercase'}}>
            <div style={{animation:'pulse 1.5s ease-in-out infinite',display:'inline-block'}}>Loading suppliers...</div>
          </div>
        ) : (
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(340px,1fr))',gap:1,background:'var(--border)',border:'1px solid var(--border)'}}>
            {allVendors.map(v=>(
              <VendorCard key={v.id} vendor={v} setPage={setPage} setActiveVendor={setActiveVendor} />
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function VendorCard({vendor:v, setPage, setActiveVendor}) {
  const isApply = v.color === 'apply';
  const isShop = v.url !== null;

  if (isApply) return (
    <div onClick={()=>setPage('supplier')}
      style={{background:'var(--noir-2)',padding:'2.5rem',cursor:'pointer',border:'1px dashed rgba(201,169,110,0.25)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',textAlign:'center',minHeight:280,transition:'all 0.25s'}}
      onMouseEnter={e=>e.currentTarget.style.background='var(--noir-3)'}
      onMouseLeave={e=>e.currentTarget.style.background='var(--noir-2)'}>
      <div style={{fontSize:'2.5rem',color:'var(--border-hi)',marginBottom:'1rem',fontWeight:100}}>+</div>
      <div style={{fontFamily:'var(--ff-display)',fontSize:'1.4rem',fontWeight:300,color:'var(--mist)',marginBottom:'0.5rem'}}>Your Brand Here</div>
      <div style={{fontSize:'0.84rem',letterSpacing:'2px',textTransform:'uppercase',color:'var(--gold)',marginBottom:'1rem'}}>Open Supplier Slot</div>
      <div style={{fontSize:'0.90rem',color:'var(--mist)',lineHeight:1.7,maxWidth:260}}>{v.desc}</div>
      <div style={{marginTop:'1.5rem',fontSize:'0.75rem',letterSpacing:'2.5px',textTransform:'uppercase',color:'var(--gold)',border:'1px solid var(--border-hi)',padding:'0.5rem 1.25rem'}}>Apply to Join →</div>
    </div>
  );

  const isLogoVendor = v.id === 'valet-by-nuor' || v.id === 'snugl';
  const isSelena = v.id === 'gifts-by-selena';

  return (
    <div
      style={{background:v.color==='selena'?'#1A1218':v.highlight?'var(--noir-3)':'var(--noir-2)',padding:'2.5rem',cursor:'pointer',position:'relative',transition:'background 0.25s',display:'flex',flexDirection:'column'}}
      onMouseEnter={e=>e.currentTarget.style.background=v.color==='selena'?'#231820':'var(--noir-4)'}
      onMouseLeave={e=>e.currentTarget.style.background=v.color==='selena'?'#1A1218':v.highlight?'var(--noir-3)':'var(--noir-2)'}
      onClick={()=>isShop?window.open(v.url,'_blank'):null}>
      {(v.highlight || v.id==='snugl') && (
        <div style={{position:'absolute',top:'1.25rem',right:'1.25rem',fontSize:'0.62rem',letterSpacing:'1.5px',textTransform:'uppercase',color:'var(--gold)',border:'1px solid var(--border-hi)',padding:'3px 10px',background:'rgba(201,169,110,0.08)'}}>Official Partner</div>
      )}
      {isSelena && (
        <div style={{position:'absolute',top:'1.25rem',right:'1.25rem',fontSize:'0.62rem',letterSpacing:'1.5px',textTransform:'uppercase',color:'rgba(210,160,160,0.9)',border:'1px solid rgba(210,160,160,0.3)',padding:'3px 10px',background:'rgba(210,160,160,0.08)'}}>Curated Partner</div>
      )}
      <div style={{marginBottom:'1.25rem',minHeight:'3rem',display:'flex',alignItems:'center'}}>
        {isLogoVendor
          ? <VendorLogo vendor={v} height={v.id==='snugl'?72:60} dark={true} />
          : isSelena
          ? <div style={{display:'flex',alignItems:'center',gap:'0.65rem'}}>
              <div style={{width:48,height:48,background:'linear-gradient(135deg,#C4956A,#A0704A)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:'1.4rem'}}>🎁</div>
              <div style={{fontFamily:'var(--ff-display)',fontSize:'1.3rem',fontWeight:300,color:'#F5DDD0',letterSpacing:'0.5px',lineHeight:1.1}}>Gifts By<br/><span style={{color:'#C4956A'}}>Selena</span></div>
            </div>
          : <span style={{fontSize:'2.5rem',opacity:0.25}}>{v.icon}</span>
        }
      </div>
      {/* Only show name as text for non-logo vendors; logo vendors show name via the logo component */}
      {(!isLogoVendor && !isSelena) && (
        <div style={{fontFamily:'var(--ff-display)',fontSize:'1.5rem',fontWeight:300,color:'var(--white)',marginBottom:'0.35rem'}}>{v.name}</div>
      )}
      {(isLogoVendor || isSelena) && (
        <div style={{marginBottom:'0.35rem'}}/>
      )}
      <div style={{fontSize:'0.72rem',letterSpacing:'2px',textTransform:'uppercase',color:(v.highlight||v.id==='snugl')?'var(--gold)':isSelena?'rgba(210,160,160,0.7)':'var(--mist)',marginBottom:'0.5rem'}}>{v.category}</div>
      <div style={{fontSize:'0.82rem',color:'var(--mist)',marginBottom:'1.25rem',letterSpacing:'0.5px',display:'flex',alignItems:'center',gap:'0.5rem'}}>
        {v.dest}
        {isSelena && <span style={{fontSize:'0.60rem',letterSpacing:'1.5px',textTransform:'uppercase',color:'rgba(210,160,160,0.8)',border:'1px solid rgba(210,160,160,0.25)',padding:'1px 6px',background:'rgba(210,160,160,0.06)'}}>Tampa Bay Only</span>}
      </div>
      <p style={{fontSize:'0.95rem',color:'var(--mist)',lineHeight:1.8,marginBottom:'1.5rem',fontWeight:300}}>{v.desc}</p>
      {v.products.length > 0 && (
        <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:'1.5rem'}}>
          {v.products.map(p=>(
            <span key={p} style={{fontSize:'0.72rem',color:(v.highlight||v.id==='snugl')?'var(--gold-dim)':'var(--mist)',border:`1px solid ${(v.highlight||v.id==='snugl')?'var(--border)':'rgba(253,252,248,0.08)'}`,padding:'3px 10px',letterSpacing:'0.5px'}}>{p}</span>
          ))}
        </div>
      )}
      <div style={{marginTop:'auto'}}>
        {isShop ? (
          <button
            onClick={(e)=>{e.stopPropagation();window.open('/shop/'+v.name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,''),'_self');}}
            style={{background:'var(--gold)',color:'var(--noir)',padding:'0.75rem 1.75rem',border:'none',fontSize:'0.78rem',fontWeight:500,letterSpacing:'2.5px',textTransform:'uppercase',width:'100%',cursor:'pointer',fontFamily:'var(--ff-body)'}}>
            Shop {v.name} →
          </button>
        ) : (
          <button
            onClick={(e)=>{e.stopPropagation();setPage('supplier');}}
            style={{background:'transparent',color:'var(--gold)',padding:'0.75rem 1.75rem',border:'1px solid var(--border-hi)',fontSize:'0.78rem',fontWeight:400,letterSpacing:'2.5px',textTransform:'uppercase',width:'100%',cursor:'pointer',transition:'all 0.2s',fontFamily:'var(--ff-body)'}}
            onMouseEnter={e=>{e.currentTarget.style.background='rgba(201,169,110,0.08)';e.currentTarget.style.borderColor='var(--gold)';}}
            onMouseLeave={e=>{e.currentTarget.style.background='transparent';e.currentTarget.style.borderColor='var(--border-hi)';}}>
            Apply to List Your Brand →
          </button>
        )}
      </div>
    </div>
  );
}

// ── PRODUCTS PAGE ─────────────────────────────────────────────────────────────
function ProductsPage({setPage}) {
  const [cat, setCat] = useState('all');
  const [search, setSearch] = useState('');
  const [selected, setSelected] = useState(null);

  const filtered = PRODUCTS.filter(p => {
    if (cat !== 'all' && p.category !== cat) return false;
    if (search && !p.name.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  if (selected) return <ProductDetail product={selected} onBack={()=>setSelected(null)}/>;

  return (
    <div style={{paddingTop:60}}>
      <div style={{padding:'1.5rem 2.5rem',background:'var(--noir-2)',borderBottom:'1px solid var(--border)',display:'flex',gap:'1rem',flexWrap:'wrap',alignItems:'center'}}>
        <span onClick={()=>setPage('vendors')} style={{fontSize:'0.78rem',letterSpacing:'2px',textTransform:'uppercase',color:'var(--gold)',cursor:'pointer',marginRight:'0.5rem'}}>← Vendors</span>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search products..."
          style={{flex:1,minWidth:180,background:'var(--mist-xlow)',border:'1px solid var(--border)',color:'var(--white)',padding:'0.6rem 1rem',fontSize:'0.98rem',outline:'none'}}/>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {CATEGORIES.map(c=>(
            <button key={c.id} onClick={()=>setCat(c.id)}
              style={{background:cat===c.id?'var(--gold)':'transparent',color:cat===c.id?'var(--noir)':'var(--mist)',border:`1px solid ${cat===c.id?'var(--gold)':'var(--border)'}`,padding:'0.45rem 0.9rem',fontSize:'0.75rem',letterSpacing:'1.5px',textTransform:'uppercase'}}>
              {c.icon} {c.label}
            </button>
          ))}
        </div>
      </div>
      <div style={{padding:'2rem 2.5rem',background:'var(--noir)'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'1.5rem'}}>
          <div style={{fontSize:'0.90rem',color:'var(--mist)'}}>{filtered.length} products · Valet By Nuor</div>
          <a href="https://valetbynuor.com" target="_blank" style={{fontSize:'0.78rem',letterSpacing:'2px',textTransform:'uppercase',color:'var(--gold)',textDecoration:'none'}}>Visit valetbynuor.com ↗</a>
        </div>
        {filtered.length === 0 ? (
          <div style={{textAlign:'center',padding:'5rem',color:'var(--mist)'}}>
            <div style={{fontFamily:'var(--ff-display)',fontSize:'2rem',fontWeight:300,marginBottom:'0.75rem'}}>No products found</div>
            <button onClick={()=>{setSearch('');setCat('all');}} style={{background:'var(--gold)',color:'var(--noir)',padding:'0.7rem 2rem',border:'none',fontSize:'0.78rem',letterSpacing:'2px',textTransform:'uppercase',marginTop:'1rem'}}>Clear Filters</button>
          </div>
        ) : (
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(250px,1fr))',gap:12}}>
            {filtered.map(p=>(
              <div key={p.id}
                style={{background:'var(--noir-3)',border:'1px solid var(--border)',padding:'1.5rem',cursor:'pointer',transition:'border-color 0.2s'}}
                onMouseEnter={e=>e.currentTarget.style.borderColor='var(--border-hi)'}
                onMouseLeave={e=>e.currentTarget.style.borderColor='var(--border)'}
                onClick={()=>setSelected(p)}>
                {p.tag && <div style={{fontSize:'0.62rem',letterSpacing:'1.5px',textTransform:'uppercase',color:'var(--gold)',border:'1px solid var(--border-hi)',padding:'2px 8px',display:'inline-block',marginBottom:'0.75rem'}}>{p.tag}</div>}
                <div style={{fontSize:'2.5rem',opacity:0.4,marginBottom:'0.75rem'}}>{p.icon}</div>
                <div style={{fontSize:'0.65rem',letterSpacing:'2px',textTransform:'uppercase',color:'var(--gold-dim)',marginBottom:'0.35rem'}}>{CATEGORIES.find(c=>c.id===p.category)?.label}</div>
                <div style={{fontFamily:'var(--ff-display)',fontSize:'1.15rem',fontWeight:300,color:'var(--white)',marginBottom:'0.5rem',lineHeight:1.25}}>{p.name}</div>
                <div style={{fontSize:'0.84rem',color:'var(--mist)',lineHeight:1.7,marginBottom:'0.75rem'}}>{p.desc.slice(0,75)}...</div>
                <div style={{fontFamily:'var(--ff-display)',fontSize:'1.3rem',fontWeight:300,color:'var(--gold)',marginBottom:'0.75rem'}}>{p.price ? `$${p.price}` : 'View'}</div>
                <button
                  onClick={e=>{e.stopPropagation();window.open(p.url,'_blank');}}
                  style={{width:'100%',background:'transparent',color:'var(--gold)',padding:'0.55rem',border:'1px solid var(--border-hi)',fontSize:'0.72rem',letterSpacing:'2px',textTransform:'uppercase'}}>
                  {p.price ? `Shop Now — $${p.price} ↗` : 'View Collection ↗'}
                </button>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

          <h1 style={{fontFamily:'var(--ff-display)',fontSize:'2.5rem',fontWeight:300,lineHeight:1.1,marginBottom:'1.5rem'}}>{p.name}</h1>
          <p style={{fontSize:'1.02rem',color:'var(--mist)',lineHeight:1.9,marginBottom:'2rem',fontWeight:300}}>{p.desc}</p>

          <button onClick={()=>window.open(p.url,'_blank')} style={{width:'100%',background:'var(--gold)',color:'var(--noir)',padding:'1rem',border:'none',fontSize:'0.84rem',fontWeight:500,letterSpacing:'3px',textTransform:'uppercase'}}>
            {p.price ? `Shop on Valet By Nuor — $${p.price} ↗` : 'View Collection ↗'}
          </button>
          <div style={{marginTop:'1.5rem',display:'flex',flexDirection:'column',gap:'0.6rem'}}>
            {['Delivered to your hotel','Same-day in Tampa & Orlando','Brand new from Valet By Nuor','Call (813) 816-2448 for help'].map(f=>(
              <div key={f} style={{display:'flex',gap:'0.75rem',alignItems:'center',fontSize:'0.90rem',color:'var(--mist)'}}><span style={{color:'var(--gold)',fontSize:'0.70rem'}}>◆</span>{f}</div>
            ))}

// ── HOTEL CONCIERGE ───────────────────────────────────────────────────────────
function HotelConcierge() {
  const [done, setDone] = useState(false);
  const [form, setForm] = useState({name:'',email:'',phone:'',dest:'',checkin:'',checkout:'',guests:'1',budget:'',type:'leisure',requests:''});
  const f = (k,v) => setForm(p=>({...p,[k]:v}));

  if (done) return (
    <div style={{paddingTop:60,minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',textAlign:'center',padding:'4rem 2rem',background:'var(--noir)'}}>
      <div style={{fontFamily:'var(--ff-display)',fontSize:'4rem',fontWeight:300,marginBottom:'1rem'}}>Request <em style={{color:'var(--gold)',fontStyle:'italic'}}>Received</em></div>
      <p style={{fontSize:'1.02rem',color:'var(--mist)',lineHeight:1.9,maxWidth:480,marginBottom:'1.5rem'}}>Thank you, <strong style={{color:'var(--white)'}}>{form.name}</strong>. Our travel concierge will contact you at <strong style={{color:'var(--white)'}}>{form.email}</strong> within 24 hours with hotel options for <strong style={{color:'var(--white)'}}>{form.dest}</strong>.</p>
      <div style={{fontSize:'0.98rem',color:'var(--gold)',marginBottom:'2rem'}}>(813) 816-2448 · support@valetbynuor.com</div>
    </div>

  return (
    <div style={{paddingTop:60,minHeight:'100vh',background:'var(--noir)'}}>
      <div style={{padding:'4rem 3rem 3rem',background:'var(--gold)'}}>
        <div style={{fontSize:'0.72rem',letterSpacing:'4px',textTransform:'uppercase',color:'rgba(8,14,26,0.5)',marginBottom:'1rem'}}>Travel Concierge</div>
        <h1 style={{fontFamily:'var(--ff-display)',fontSize:'clamp(2.5rem,5vw,4rem)',fontWeight:300,color:'var(--noir)'}}>Book your <em style={{fontStyle:'italic'}}>perfect stay</em></h1>
        <p style={{fontSize:'1.00rem',color:'rgba(8,14,26,0.6)',marginTop:'1rem',maxWidth:500,lineHeight:1.8,fontWeight:300}}>Exclusive hotel rates not available to the public. Our travel agents handle everything — you just show up.</p>

        <div style={{display:'flex',flexDirection:'column',gap:'1.1rem'}}>
          <div className="bf-form-2col" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1rem'}}>
            {[['name','Full Name','text'],['email','Email','email']].map(([k,l,t])=>(
              <div key={k}>
                <div style={{fontSize:'0.70rem',letterSpacing:'2px',textTransform:'uppercase',color:'var(--mist)',marginBottom:'0.4rem'}}>{l}</div>
                <input type={t} value={form[k]} onChange={e=>f(k,e.target.value)} style={{width:'100%',background:'var(--mist-xlow)',border:'1px solid var(--border)',color:'var(--white)',padding:'0.75rem 1rem',fontSize:'1.00rem',outline:'none'}}/>
              </div>
            ))}
          </div>
          <div>
            <div style={{fontSize:'0.70rem',letterSpacing:'2px',textTransform:'uppercase',color:'var(--mist)',marginBottom:'0.4rem'}}>Phone / WhatsApp</div>
            <input type="tel" value={form.phone} onChange={e=>f('phone',e.target.value)} style={{width:'100%',background:'var(--mist-xlow)',border:'1px solid var(--border)',color:'var(--white)',padding:'0.75rem 1rem',fontSize:'1.00rem',outline:'none'}}/>
          </div>
          <div>
            <div style={{fontSize:'0.70rem',letterSpacing:'2px',textTransform:'uppercase',color:'var(--mist)',marginBottom:'0.4rem'}}>Destination</div>
            <select value={form.dest} onChange={e=>f('dest',e.target.value)} style={{width:'100%',background:'var(--noir-3)',border:'1px solid var(--border)',color:form.dest?'var(--white)':'var(--mist)',padding:'0.75rem 1rem',fontSize:'1.00rem',outline:'none'}}>
              <option value="">Select destination...</option>
              {DESTINATIONS.map(d=><option key={d.id} value={d.name}>{d.name}, {d.state}</option>)}
              <option value="Other">Other</option>
            </select>
          </div>
          <div className="bf-form-2col" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1rem'}}>
            {[['checkin','Check-in'],['checkout','Check-out']].map(([k,l])=>(
              <div key={k}>
                <div style={{fontSize:'0.70rem',letterSpacing:'2px',textTransform:'uppercase',color:'var(--mist)',marginBottom:'0.4rem'}}>{l}</div>
                <input type="date" value={form[k]} onChange={e=>f(k,e.target.value)} style={{width:'100%',background:'var(--mist-xlow)',border:'1px solid var(--border)',color:'var(--white)',padding:'0.75rem 1rem',fontSize:'1.00rem',outline:'none',colorScheme:'dark'}}/>
              </div>
            ))}
          </div>
          <div className="bf-form-2col" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1rem'}}>
            <div>
              <div style={{fontSize:'0.70rem',letterSpacing:'2px',textTransform:'uppercase',color:'var(--mist)',marginBottom:'0.4rem'}}>Guests</div>
              <select value={form.guests} onChange={e=>f('guests',e.target.value)} style={{width:'100%',background:'var(--noir-3)',border:'1px solid var(--border)',color:'var(--white)',padding:'0.75rem 1rem',fontSize:'1.00rem',outline:'none'}}>
                {['1','2','3','4','5','6+'].map(n=><option key={n} value={n}>{n} {n==='1'?'guest':'guests'}</option>)}
              </select>
            </div>
            <div>
              <div style={{fontSize:'0.70rem',letterSpacing:'2px',textTransform:'uppercase',color:'var(--mist)',marginBottom:'0.4rem'}}>Budget / Night</div>
              <select value={form.budget} onChange={e=>f('budget',e.target.value)} style={{width:'100%',background:'var(--noir-3)',border:'1px solid var(--border)',color:form.budget?'var(--white)':'var(--mist)',padding:'0.75rem 1rem',fontSize:'1.00rem',outline:'none'}}>
                <option value="">Select...</option>
                <option value="under100">Under $100</option>
                <option value="100-200">$100 to $200</option>
                <option value="200-350">$200 to $350</option>
                <option value="350-500">$350 to $500</option>
                <option value="500+">$500+ luxury</option>
              </select>
            </div>
          </div>
          <div>
            <div style={{fontSize:'0.70rem',letterSpacing:'2px',textTransform:'uppercase',color:'var(--mist)',marginBottom:'0.75rem'}}>Trip Type</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}}>
              {[['leisure','Leisure'],['business','Business'],['family','Family'],['romantic','Romantic'],['wedding','Wedding'],['other','Other']].map(([v,l])=>(
                <div key={v} onClick={()=>f('type',v)} style={{padding:'0.75rem',border:`1px solid ${form.type===v?'var(--border-hi)':'var(--border)'}`,cursor:'pointer',fontSize:'0.88rem',color:form.type===v?'var(--white)':'var(--mist)',background:form.type===v?'var(--mist-xlow)':'transparent',textAlign:'center'}}>{l}</div>
              ))}
            </div>
          </div>
          <div>
            <div style={{fontSize:'0.70rem',letterSpacing:'2px',textTransform:'uppercase',color:'var(--mist)',marginBottom:'0.4rem'}}>Special Requests</div>
            <textarea value={form.requests} onChange={e=>f('requests',e.target.value)} rows={3} placeholder="Ocean view, pet-friendly, early check-in..." style={{width:'100%',background:'var(--mist-xlow)',border:'1px solid var(--border)',color:'var(--white)',padding:'0.75rem 1rem',fontSize:'0.98rem',outline:'none',resize:'vertical',fontFamily:'var(--ff-body)',lineHeight:1.7}}/>
          </div>
          <button
            onClick={async()=>{if(form.name&&form.email&&form.dest){await submitToFormspree({type:'HOTEL REQUEST',...form,source:'BagFree Hotel Concierge'});setDone(true);}}}
            style={{background:'var(--gold)',color:'var(--noir)',padding:'1rem',border:'none',fontSize:'0.84rem',fontWeight:500,letterSpacing:'3px',textTransform:'uppercase',opacity:(!form.name||!form.email||!form.dest)?0.4:1}}>
            Submit Hotel Request
          </button>
        </div>
      </div>
    </div>
  );
}

// ── SUPPLIER PORTAL ─────────────────────────────────────────────────────────
function SupplierPortal() {
  const [step, setStep] = React.useState(1);
  const [done, setDone] = React.useState(false);

    biz:'', contact:'', email:'', phone:'', website:'',

  function toggleDest(d) {
    setForm(f=>({...f, destinations: f.destinations.includes(d)

    }));

  const PLANS = [
    {

      price:'$59',
      per:'/ month · per city',
      stripe:'https://buy.stripe.com/bagfree-basic',
      color:'rgba(201,169,110,0.12)',
      borderColor:'rgba(201,169,110,0.3)',
      badge:null,
      benefits:[
        'Listed on your city vendor page',
        'Visible to all BagFree customers in that city',
        'Click-through to your website or store',
        'Standard listing position',
        '$59 per additional city served',
      ],
      notIncluded:[
        'Priority placement',
        'Newsletter / gift bag brochure',
        'Home page feature',
      ]
    },
    {
      id:'premium',
      name:'Premium',
      price:'$99',
      per:'/ month · per city',
      stripe:'https://buy.stripe.com/bagfree-premium',
      color:'rgba(201,169,110,0.18)',
      borderColor:'rgba(201,169,110,0.6)',
      badge:'Most Popular',
      benefits:[
        'Everything in Basic',
        'Priority placement — listed before Basic vendors',
        'Ordered by registration date among Premium vendors',
        'Featured in monthly BagFree newsletter',
        'Listed in vendor brochure inside customer gift bags',
        '$99 per additional city served',
      ],
      notIncluded:[
        'Home page feature',
      ]
    },
    {
      id:'elite',
      name:'Elite',
      price:'$199',
      per:'/ month · all cities',
      stripe:'https://buy.stripe.com/bagfree-elite',
      color:'rgba(201,169,110,0.22)',
      borderColor:'var(--gold)',
      badge:'Elite Access',
      benefits:[
        'Everything in Premium',
        'Featured on the BagFree home page',
        'Curated Suppliers section — maximum visibility',
        'Top priority placement across all cities you serve',
        'Preferred vendor badge on all listings',
        'Unlimited cities included',
        'Direct feature in all BagFree marketing materials',
      ],
      notIncluded:[]

  ];

  if (done) return (
    <div style={{paddingTop:60,minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',textAlign:'center',padding:'4rem 2rem',background:'var(--noir)'}}>
      <div style={{fontFamily:'var(--ff-display)',fontSize:'0.65rem',letterSpacing:'4px',textTransform:'uppercase',color:'var(--gold)',marginBottom:'1.5rem'}}>Application Received</div>
      <h1 style={{fontFamily:'var(--ff-display)',fontSize:'clamp(2.5rem,5vw,4rem)',fontWeight:300,marginBottom:'1rem'}}>
        You&apos;re on the <em style={{color:'var(--gold)',fontStyle:'italic'}}>list</em>
      </h1>
      <p style={{fontSize:'1.02rem',color:'var(--mist)',lineHeight:1.9,maxWidth:520,marginBottom:'2rem'}}>
        Thank you, <strong style={{color:'var(--white)'}}>{form.biz}</strong>. Our team will review your application and reach out to <strong style={{color:'var(--white)'}}>{form.email}</strong> within 3 business days. Once approved, your listing goes live free for 6 months — then auto-converts to your chosen plan. No reapplication needed.
      </p>
      <div style={{background:'rgba(201,169,110,0.08)',border:'1px solid rgba(201,169,110,0.25)',padding:'1.5rem 2.5rem',marginBottom:'2rem',textAlign:'left',maxWidth:420}}>
        <div style={{fontSize:'0.60rem',letterSpacing:'3px',textTransform:'uppercase',color:'var(--gold)',marginBottom:'0.75rem'}}>Your application summary</div>
        <div style={{fontSize:'0.90rem',color:'var(--mist)',lineHeight:2}}>
          <div><span style={{color:'var(--white)'}}>Business:</span> {form.biz}</div>
          <div><span style={{color:'var(--white)'}}>Cities:</span> {form.destinations.join(', ')}</div>
          <div><span style={{color:'var(--white)'}}>Plan interest:</span> {form.plan ? PLANS.find(p=>p.id===form.plan)?.name + ' — ' + PLANS.find(p=>p.id===form.plan)?.price + '/mo' : 'Not selected'}</div>
        </div>
      </div>
      <div style={{fontSize:'0.82rem',color:'var(--gold)',letterSpacing:'2px',textTransform:'uppercase'}}>BagFree Supplier Network · Powered by Valet By Nuor</div>
    </div>
  );

  // Step indicator
  const steps = ['Business Info', 'Products & Cities', 'Choose Plan'];

  return (
    <div style={{paddingTop:60,minHeight:'100vh',background:'var(--noir)'}}>

      {/* Header */}
      <div style={{padding:'4rem 3rem 3rem',background:'var(--gold)',position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',top:'-30%',right:'-5%',width:400,height:400,background:'radial-gradient(ellipse,rgba(8,14,26,0.12),transparent 70%)',pointerEvents:'none'}}/>
        <div style={{fontSize:'0.72rem',letterSpacing:'4px',textTransform:'uppercase',color:'rgba(8,14,26,0.5)',marginBottom:'1rem',position:'relative'}}>Supplier Application</div>
        <h1 style={{fontFamily:'var(--ff-display)',fontSize:'clamp(2.5rem,5vw,4rem)',fontWeight:300,color:'var(--noir)',position:'relative'}}>
          Join the <em style={{fontStyle:'italic'}}>BagFree</em> Network
        </h1>
        <p style={{fontSize:'1.00rem',color:'rgba(8,14,26,0.6)',marginTop:'1rem',maxWidth:500,lineHeight:1.8,fontWeight:300,position:'relative'}}>
          Reach bag-free travelers in Florida, Georgia & the Caribbean. Apply for vetting — once approved, choose your subscription plan and go live.
        </p>
      </div>

      <div style={{maxWidth:780,margin:'0 auto',padding:'3rem 2rem'}}>

        {/* Step bar */}
        <div style={{display:'flex',marginBottom:'3rem',border:'1px solid var(--border)',overflow:'hidden'}}>
          {steps.map((s,i)=>(
            <div key={s} style={{flex:1,padding:'0.85rem',textAlign:'center',fontSize:'0.68rem',letterSpacing:'2px',textTransform:'uppercase',
              background:step===i+1?'var(--gold)':step>i+1?'rgba(201,169,110,0.12)':'transparent',
              color:step===i+1?'var(--noir)':step>i+1?'var(--gold)':'var(--mist)',
              borderRight:i<2?'1px solid var(--border)':'none',cursor:step>i+1?'pointer':'default',
              display:'flex',alignItems:'center',justifyContent:'center',gap:'0.5rem'}}
              onClick={()=>step>i+1&&setStep(i+1)}>
              <span style={{width:18,height:18,borderRadius:'50%',
                background:step===i+1?'rgba(8,14,26,0.2)':step>i+1?'rgba(201,169,110,0.3)':'rgba(255,255,255,0.06)',
                display:'flex',alignItems:'center',justifyContent:'center',fontSize:'0.62rem',flexShrink:0}}>
                {step>i+1?'✓':i+1}
              </span>
              {s}
            </div>
          ))}
        </div>

        {/* STEP 1 — Business Info */}
        {step===1 && (
          <div style={{display:'flex',flexDirection:'column',gap:'1.1rem'}}>
            <div style={{fontSize:'0.60rem',letterSpacing:'3px',textTransform:'uppercase',color:'var(--gold)',marginBottom:'0.25rem'}}>Tell us about your business</div>
            {[['biz','Business Name','text'],['contact','Contact Person','text'],['email','Email Address','email'],['phone','Phone / WhatsApp','tel'],['website','Website (optional)','text']].map(([k,l,t])=>(
              <div key={k}>
                <div style={{fontSize:'0.62rem',letterSpacing:'2px',textTransform:'uppercase',color:'var(--mist)',marginBottom:'0.4rem'}}>{l}</div>
                <input type={t} value={form[k]} onChange={e=>setForm({...form,[k]:e.target.value})}
                  style={{width:'100%',background:'var(--noir-2)',border:'1px solid var(--border)',color:'var(--white)',padding:'0.75rem 1rem',fontSize:'0.98rem',outline:'none',fontFamily:'var(--fb)',transition:'border-color 0.2s'}}
                  onFocus={e=>e.target.style.borderColor='rgba(201,169,110,0.5)'}
                  onBlur={e=>e.target.style.borderColor='var(--border)'}/>
              </div>
            ))}
            <button onClick={()=>form.biz&&form.email&&setStep(2)}
              style={{background:'linear-gradient(135deg,var(--gold),#b8893e)',color:'var(--noir)',padding:'1rem',border:'none',fontSize:'0.78rem',fontWeight:600,letterSpacing:'3px',textTransform:'uppercase',opacity:(!form.biz||!form.email)?0.4:1,fontFamily:'var(--fb)',marginTop:'0.5rem'}}>
              Continue →
            </button>
          </div>
        )}

        {/* STEP 2 — Products & Cities */}
        {step===2 && (
          <div style={{display:'flex',flexDirection:'column',gap:'1.5rem'}}>
            <div>
              <div style={{fontSize:'0.62rem',letterSpacing:'2px',textTransform:'uppercase',color:'var(--mist)',marginBottom:'0.75rem'}}>Product Category</div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}}>
                {[["Women's Fashion",'👗'],["Men's Wear",'👔'],['Wellness','💊'],['Beauty & Grooming','💄'],['Baby & Family','🍼'],['Accessories','👜'],['Tech & Gadgets','📱'],['Food & Beverage','🍃'],['Other','✦']].map(([c,icon])=>(
                  <div key={c} onClick={()=>setForm({...form,category:c})}
                    style={{padding:'0.75rem',border:`1px solid ${form.category===c?'rgba(201,169,110,0.6)':'var(--border)'}`,cursor:'pointer',fontSize:'0.82rem',
                      color:form.category===c?'var(--white)':'var(--mist)',
                      background:form.category===c?'rgba(201,169,110,0.1)':'transparent',
                      textAlign:'center',transition:'all 0.2s'}}>
                    <div style={{fontSize:'1.2rem',marginBottom:'3px'}}>{icon}</div>
                    <div style={{fontSize:'0.68rem',letterSpacing:'0.5px'}}>{c}</div>
                  </div>
                ))}
              </div>
            </div>

            <div>
              <div style={{fontSize:'0.62rem',letterSpacing:'2px',textTransform:'uppercase',color:'var(--mist)',marginBottom:'0.5rem'}}>Cities You Serve</div>
              <div style={{fontSize:'0.72rem',color:'rgba(201,169,110,0.6)',marginBottom:'0.75rem'}}>Basic & Premium plans are priced per city. Elite covers all cities.</div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:8}}>
                {[
                  {id:'tampa',name:'Tampa Bay',state:'FL',img:'🌴'},
                  {id:'orlando',name:'Orlando',state:'FL',img:'🎆'},
                  {id:'miami',name:'Miami Beach',state:'FL',img:'🌊'},
                  {id:'keys',name:'Florida Keys',state:'FL',img:'🐠'},
                  {id:'atlanta',name:'Atlanta',state:'GA',img:'🏙️'},
                  {id:'savannah',name:'Savannah',state:'GA',img:'🌿'},
                  {id:'trinidad',name:'Trinidad & Tobago',state:'TT',img:'🏝️'},
                  {id:'svg',name:'St. Vincent & Grenadines',state:'VC',img:'⛵'},
                ].map(d=>(
                  <div key={d.id} onClick={()=>toggleDest(d.id)}
                    style={{padding:'0.75rem 1rem',border:`1px solid ${form.destinations.includes(d.id)?'rgba(201,169,110,0.6)':'var(--border)'}`,
                      cursor:'pointer',fontSize:'0.88rem',
                      color:form.destinations.includes(d.id)?'var(--white)':'var(--mist)',
                      background:form.destinations.includes(d.id)?'rgba(201,169,110,0.08)':'transparent',
                      display:'flex',alignItems:'center',gap:'0.6rem',transition:'all 0.2s'}}>
                    <span>{d.img}</span>
                    <div>
                      <div style={{fontSize:'0.82rem'}}>{d.name}</div>
                      <div style={{fontSize:'0.60rem',letterSpacing:'1px',color:'rgba(201,169,110,0.6)'}}>{d.state}</div>
                    </div>
                    {form.destinations.includes(d.id) && <span style={{marginLeft:'auto',color:'var(--gold)',fontSize:'0.72rem'}}>✓</span>}
                  </div>
                ))}
              </div>
            </div>

            <div>
              <div style={{fontSize:'0.62rem',letterSpacing:'2px',textTransform:'uppercase',color:'var(--mist)',marginBottom:'0.4rem'}}>Tell us about your products</div>
              <textarea value={form.description} onChange={e=>setForm({...form,description:e.target.value})} rows={4}
                placeholder="Describe what you offer and why BagFree customers would love it..."
                style={{width:'100%',background:'var(--noir-2)',border:'1px solid var(--border)',color:'var(--white)',padding:'0.75rem 1rem',fontSize:'0.95rem',outline:'none',resize:'vertical',fontFamily:'var(--fb)',lineHeight:1.7}}/>
            </div>

            <div style={{display:'flex',gap:'1rem'}}>
              <button onClick={()=>setStep(1)} style={{background:'transparent',color:'var(--mist)',padding:'0.9rem 1.5rem',border:'1px solid var(--border)',fontSize:'0.75rem',letterSpacing:'2px',textTransform:'uppercase',fontFamily:'var(--fb)'}}>← Back</button>
              <button onClick={()=>form.category&&form.destinations.length>0&&form.description&&setStep(3)}
                style={{flex:1,background:'linear-gradient(135deg,var(--gold),#b8893e)',color:'var(--noir)',padding:'1rem',border:'none',fontSize:'0.78rem',fontWeight:600,letterSpacing:'3px',textTransform:'uppercase',fontFamily:'var(--fb)',
                  opacity:(!form.category||form.destinations.length===0||!form.description)?0.4:1}}>
                Continue →
              </button>
            </div>
          </div>
        )}

        {/* STEP 3 — Choose Plan */}
        {step===3 && (
          <div style={{display:'flex',flexDirection:'column',gap:'1.5rem'}}>
            {/* Business Type — Free Trial Eligibility */}
            <div style={{marginBottom:'1.5rem'}}>
              <div style={{fontSize:'0.60rem',letterSpacing:'3px',textTransform:'uppercase',color:'var(--gold)',marginBottom:'0.5rem'}}>Business Type</div>
              <div style={{fontSize:'0.80rem',color:'var(--mist)',lineHeight:1.7,marginBottom:'1rem'}}>
                Select all that apply. Qualifying businesses receive a <strong style={{color:'var(--green)'}}>6-month free trial</strong> on their chosen plan — no card required until month 7.
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:'0.75rem'}}>
                {[
                  {id:'micro',    label:'Micro Business',    icon:'🌱', desc:'Under 10 employees'},
                  {id:'minority', label:'Minority Owned',    icon:'✊', desc:'Minority-owned & operated'},
                  {id:'veteran',  label:'Veteran Owned',     icon:'🎖', desc:'Military veteran owned'},
                  {id:'female',   label:'Female Owned',      icon:'⭐', desc:'Woman-owned business'},
                ].map(bt=>(
                  <div key={bt.id}
                    onClick={()=>setForm(f=>({...f,
                      bizTypes: f.bizTypes?.includes(bt.id)
                        ? f.bizTypes.filter(x=>x!==bt.id)
                        : [...(f.bizTypes||[]), bt.id]
                    }))}
                    style={{
                      padding:'0.85rem 1rem',
                      border:`1px solid ${form.bizTypes?.includes(bt.id)?'rgba(93,202,165,0.5)':'var(--border)'}`,
                      background:form.bizTypes?.includes(bt.id)?'rgba(93,202,165,0.06)':'transparent',
                      cursor:'pointer',transition:'all 0.2s',
                      display:'flex',alignItems:'center',gap:'0.65rem'
                    }}>
                    <span style={{fontSize:'1.1rem'}}>{bt.icon}</span>
                    <div>
                      <div style={{fontSize:'0.80rem',color:form.bizTypes?.includes(bt.id)?'var(--white)':'var(--mist)',fontWeight:form.bizTypes?.includes(bt.id)?500:400}}>{bt.label}</div>
                      <div style={{fontSize:'0.62rem',color:'rgba(253,252,248,0.35)',marginTop:1}}>{bt.desc}</div>
                    </div>
                    {form.bizTypes?.includes(bt.id) && <span style={{marginLeft:'auto',color:'var(--green)',fontSize:'0.75rem',flexShrink:0}}>✓</span>}
                  </div>
                ))}
              </div>

              {/* Free trial banner */}
              {form.bizTypes?.length > 0 && (
                <div style={{background:'rgba(93,202,165,0.08)',border:'1px solid rgba(93,202,165,0.3)',padding:'1rem 1.25rem',display:'flex',alignItems:'center',gap:'1rem'}}>
                  <div style={{fontSize:'1.5rem',flexShrink:0}}>🎉</div>
                  <div>
                    <div style={{fontSize:'0.75rem',fontWeight:600,color:'var(--green)',letterSpacing:'1px',marginBottom:'2px'}}>
                      You qualify for a 6-month free trial!
                    </div>
                    <div style={{fontSize:'0.75rem',color:'rgba(253,252,248,0.55)',lineHeight:1.6}}>
                      As a {form.bizTypes.map(t=>t==='micro'?'micro business':t==='minority'?'minority-owned':t==='veteran'?'veteran-owned':'female-owned').join(' & ')} business, your first 6 months are on us. Choose your plan below — you won&apos;t be charged until month 7.
                    </div>
                  </div>
                </div>
              )}

              {form.bizTypes?.length === 0 && (
                <div style={{fontSize:'0.72rem',color:'rgba(253,252,248,0.3)',fontStyle:'italic',paddingLeft:'0.25rem'}}>
                  Not applicable? Leave unselected and proceed to choose your plan below.
                </div>
              )}
            </div>

            <div>
              <div style={{fontSize:'0.60rem',letterSpacing:'3px',textTransform:'uppercase',color:'var(--gold)',marginBottom:'0.35rem'}}>Subscription Plans</div>
              <div style={{fontSize:'0.85rem',color:'var(--mist)',lineHeight:1.7,marginBottom:'1.5rem'}}>
                Select the plan that fits your goals. Payment is activated <strong style={{color:'var(--white)'}}>after your application is approved</strong> — you won&apos;t be charged now.
                {form.bizTypes?.length > 0 && <strong style={{color:'var(--green)'}}> Your 6-month free trial applies automatically.</strong>}
              </div>

              <div style={{display:'flex',flexDirection:'column',gap:'1rem'}}>
                {PLANS.map(plan=>(
                  <div key={plan.id} onClick={()=>setForm({...form,plan:plan.id})}
                    style={{border:`1px solid ${form.plan===plan.id?plan.borderColor:'var(--border)'}`,
                      background:form.plan===plan.id?plan.color:'rgba(255,255,255,0.02)',
                      cursor:'pointer',padding:'1.5rem',transition:'all 0.25s',position:'relative'}}>
                    {plan.badge && (
                      <div style={{position:'absolute',top:'1rem',right:'1rem',fontSize:'0.58rem',letterSpacing:'2px',textTransform:'uppercase',
                        color:plan.id==='elite'?'var(--noir)':'var(--gold)',
                        background:plan.id==='elite'?'var(--gold)':'rgba(201,169,110,0.15)',
                        border:plan.id==='elite'?'none':'1px solid rgba(201,169,110,0.4)',
                        padding:'3px 10px'}}>
                        {plan.badge}
                      </div>
                    )}
                    {form.plan===plan.id && (
                      <div style={{position:'absolute',top:'1rem',left:'1rem',width:18,height:18,borderRadius:'50%',background:'var(--gold)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'0.65rem',color:'var(--noir)',fontWeight:700}}>✓</div>
                    )}
                    <div style={{display:'flex',alignItems:'flex-start',gap:'1.25rem',paddingLeft:form.plan===plan.id?'1.75rem':'0'}}>
                      <div style={{flex:1}}>
                        <div style={{display:'flex',alignItems:'baseline',gap:'0.5rem',marginBottom:'0.25rem'}}>
                          <div style={{fontFamily:'var(--ff-display)',fontSize:'1.3rem',fontWeight:300,color:'var(--white)'}}>{plan.name}</div>
                          <div style={{fontFamily:'var(--ff-display)',fontSize:'2rem',fontWeight:300,color:'var(--gold)',lineHeight:1}}>{plan.price}</div>
                          <div style={{fontSize:'0.68rem',color:'var(--mist)',letterSpacing:'0.5px'}}>{plan.per}</div>
                        </div>

                        {/* Benefits */}
                        <div style={{display:'flex',flexDirection:'column',gap:'0.3rem',marginTop:'0.85rem'}}>
                          {plan.benefits.map(b=>(
                            <div key={b} style={{display:'flex',gap:'0.6rem',alignItems:'flex-start',fontSize:'0.82rem',color:'rgba(253,252,248,0.7)'}}>
                              <span style={{color:'var(--green)',fontSize:'0.65rem',flexShrink:0,marginTop:3}}>✓</span>{b}
                            </div>
                          ))}
                          {plan.notIncluded.map(b=>(
                            <div key={b} style={{display:'flex',gap:'0.6rem',alignItems:'flex-start',fontSize:'0.82rem',color:'rgba(253,252,248,0.28)'}}>
                              <span style={{fontSize:'0.65rem',flexShrink:0,marginTop:3}}>–</span>{b}
                            </div>
                          ))}
                        </div>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* City cost summary for Basic/Premium */}
            {form.plan && form.plan !== 'elite' && form.destinations.length > 0 && (
              <div style={{background:'rgba(201,169,110,0.06)',border:'1px solid rgba(201,169,110,0.2)',padding:'1.25rem'}}>
                <div style={{fontSize:'0.60rem',letterSpacing:'2px',textTransform:'uppercase',color:'var(--gold)',marginBottom:'0.75rem'}}>Your estimated monthly cost</div>
                {form.destinations.map(d=>(
                  <div key={d} style={{display:'flex',justifyContent:'space-between',fontSize:'0.85rem',color:'var(--mist)',padding:'0.35rem 0',borderBottom:'1px solid rgba(201,169,110,0.08)'}}>
                    <span style={{color:'var(--white)'}}>{d.charAt(0).toUpperCase()+d.slice(1)}</span>
                    <span style={{color:'var(--gold)'}}>{form.plan==='basic'?'$59':'$99'}/mo</span>
                  </div>
                ))}
                <div style={{display:'flex',justifyContent:'space-between',fontSize:'0.90rem',fontWeight:600,marginTop:'0.6rem',paddingTop:'0.6rem',borderTop:'1px solid rgba(201,169,110,0.2)'}}>
                  <span style={{color:'var(--white)'}}>Total</span>
                  <span style={{color:'var(--gold)',fontFamily:'var(--ff-display)',fontSize:'1.2rem',fontWeight:300}}>

              'Shore excursion gear ready before every port stop',
              'Replenish mid-cruise — we deliver to the next port',
              'Return home with nothing to unpack or wash',
            ].map((t,i)=>(
              <div key={i} style={{display:'flex',gap:'0.75rem',marginBottom:'0.75rem',alignItems:'flex-start'}}>
                <span style={{color:'var(--gold)',fontSize:'0.70rem',marginTop:4,flexShrink:0}}>◆</span>
                <span style={{fontSize:'0.98rem',color:'rgba(253,252,248,0.65)',lineHeight:1.6}}>{t}</span>
              </div>
            ))}
          </div>
          <div style={{background:'rgba(201,169,110,0.05)',border:'1px solid var(--border)',padding:'2.5rem'}}>
            <div style={{fontSize:'0.70rem',letterSpacing:'3px',textTransform:'uppercase',color:'var(--gold)',marginBottom:'1.25rem'}}>Serving all major cruise lines</div>
            {ships.slice(0,-1).map((s,i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',gap:'0.75rem',padding:'0.65rem 0',borderBottom:'1px solid rgba(253,252,248,0.05)'}}>
                <span style={{width:6,height:6,borderRadius:'50%',background:'var(--gold)',opacity:0.5,flexShrink:0,display:'inline-block'}}/>
                <span style={{fontSize:'0.98rem',color:'rgba(253,252,248,0.6)'}}>{s}</span>
              </div>
            ))}
            <div style={{marginTop:'1.25rem',fontSize:'0.84rem',color:'rgba(253,252,248,0.3)',fontStyle:'italic'}}>+ all other cruise lines. If your ship departs from our cities, we deliver.</div>
          </div>
        </div>
      </div>

      {/* ORDER FORM */}
      <div id="cruise-order" style={{padding:'6rem 2rem',background:'rgba(201,169,110,0.04)',borderTop:'1px solid var(--border)'}}>
        <div style={{maxWidth:640,margin:'0 auto'}}>
          <div style={{textAlign:'center',marginBottom:'3rem'}}>
            <div style={{fontSize:'0.70rem',letterSpacing:'4px',textTransform:'uppercase',color:'var(--gold)',marginBottom:'0.75rem'}}>Order before you board</div>
            <h2 style={{fontFamily:'var(--ff-display)',fontSize:'clamp(1.8rem,3.5vw,2.8rem)',fontWeight:300,marginBottom:'0.75rem'}}>Get everything waiting</h2>
            <p style={{fontSize:'0.95rem',color:'rgba(253,252,248,0.45)',lineHeight:1.8}}>Fill in your details and we&apos;ll confirm your order within 2 hours.</p>
          </div>

          {submitted ? (
            <div style={{background:'rgba(93,202,165,0.1)',border:'1px solid rgba(93,202,165,0.35)',padding:'3rem',textAlign:'center'}}>
              <div style={{fontSize:'2rem',marginBottom:'1rem'}}>✦</div>
              <div style={{fontFamily:'var(--ff-display)',fontSize:'1.6rem',fontWeight:300,color:'var(--green)',marginBottom:'0.75rem'}}>Order received</div>
              <div style={{fontSize:'0.95rem',color:'rgba(253,252,248,0.55)',lineHeight:1.8}}>
                We&apos;ll confirm your cruise kit within 2 hours and coordinate delivery to your port. Check your email at <strong style={{color:'var(--white)'}}>{form.email}</strong>.
              </div>
            </div>
          ) : (
            <div style={{display:'flex',flexDirection:'column',gap:'0.85rem'}}>
              {/* Kit selector reminder */}
              <div style={{background:'rgba(201,169,110,0.08)',border:'1px solid rgba(201,169,110,0.25)',padding:'1rem 1.25rem',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div>
                  <div style={{fontSize:'0.60rem',letterSpacing:'2px',textTransform:'uppercase',color:'var(--gold)',marginBottom:'3px'}}>Selected kit</div>
                  <div style={{fontSize:'1.02rem',color:'var(--white)'}}>{kits.find(k=>k.id===form.kit)?.name} · {kits.find(k=>k.id===form.kit)?.price}</div>
                </div>
                <button onClick={()=>document.getElementById('cruise-kits').scrollIntoView({behavior:'smooth'})}
                  style={{background:'transparent',border:'1px solid var(--border)',color:'var(--mist)',padding:'4px 10px',fontSize:'0.70rem',letterSpacing:'1.5px',textTransform:'uppercase',cursor:'pointer',fontFamily:'var(--ff-body)'}}>Change</button>
              </div>

              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0.85rem'}}>
                {[['name','Your name','text'],['email','Email address','email'],['phone','Phone number','tel'],['date','Boarding date','date']].map(([k,ph,t])=>(
                  <div key={k} style={{display:'flex',flexDirection:'column',gap:4}}>
                    <label style={{fontSize:'0.60rem',letterSpacing:'2px',textTransform:'uppercase',color:'var(--gold)'}}>{ph}</label>
                    <input type={t} value={form[k]} onChange={e=>setForm(f=>({...f,[k]:e.target.value}))}
                      placeholder={t==='date'?'':ph}
                      style={{background:'var(--noir-2)',border:'1px solid var(--border)',color:'var(--white)',padding:'0.65rem 0.85rem',fontSize:'1.00rem',outline:'none',fontFamily:'var(--ff-body)',colorScheme:'dark'}}/>
                  </div>
                ))}
              </div>

              <div style={{display:'flex',flexDirection:'column',gap:4}}>
                <label style={{fontSize:'0.60rem',letterSpacing:'2px',textTransform:'uppercase',color:'var(--gold)'}}> Cruise ship</label>
                <select value={form.ship} onChange={e=>setForm(f=>({...f,ship:e.target.value}))}
                  style={{background:'var(--noir-2)',border:'1px solid var(--border)',color:'var(--white)',padding:'0.65rem 0.85rem',fontSize:'1.00rem',outline:'none',fontFamily:'var(--ff-body)',colorScheme:'dark'}}>
                  <option value=''>Select cruise line</option>
                  {ships.map(s=><option key={s} value={s}>{s}</option>)}
                </select>
              </div>

              <div style={{display:'flex',flexDirection:'column',gap:4}}>
                <label style={{fontSize:'0.60rem',letterSpacing:'2px',textTransform:'uppercase',color:'var(--gold)'}}> Departure port</label>
                <select value={form.port} onChange={e=>setForm(f=>({...f,port:e.target.value}))}
                  style={{background:'var(--noir-2)',border:'1px solid var(--border)',color:'var(--white)',padding:'0.65rem 0.85rem',fontSize:'1.00rem',outline:'none',fontFamily:'var(--ff-body)',colorScheme:'dark'}}>
                  <option value=''>Select departure port</option>
                  {ports.map(p=><option key={p} value={p}>{p}</option>)}
                </select>
              </div>

              <div style={{display:'flex',flexDirection:'column',gap:4}}>
                <label style={{fontSize:'0.60rem',letterSpacing:'2px',textTransform:'uppercase',color:'var(--gold)'}}> Special requests (optional)</label>
                <textarea value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} rows={3}
                  placeholder="Sizes, preferences, dietary needs, specific items..."
                  style={{background:'var(--noir-2)',border:'1px solid var(--border)',color:'var(--white)',padding:'0.65rem 0.85rem',fontSize:'1.00rem',outline:'none',fontFamily:'var(--ff-body)',resize:'none'}}/>
              </div>

              <button onClick={submitOrder}
                style={{background:'linear-gradient(135deg,var(--gold),#b8893e)',color:'var(--noir)',border:'none',padding:'1.1rem',fontSize:'0.90rem',fontWeight:600,letterSpacing:'3px',textTransform:'uppercase',cursor:'pointer',fontFamily:'var(--ff-body)',marginTop:'0.5rem'}}>
                Have Everything Waiting For Me ✦
              </button>
              <div style={{textAlign:'center',fontSize:'0.72rem',color:'rgba(253,252,248,0.25)',lineHeight:1.7}}>
                Delivered to your port before you board · Powered by Valet by Nuor · (813) 816-2448
              </div>
            </div>
          )}
        </div>
      </div>

    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState(() => {
    const h = window.location.hash.replace('#','');
    return h || 'home';
  });
  const [activeVendor, setActiveVendor] = useState('valet-by-nuor');

  function navigate(p) {
    window.location.hash = p;
    setPage(p);
    window.scrollTo(0,0);
  }

  React.useEffect(()=>{
    function onPop(){
      const h = window.location.hash.replace('#','');
      setPage(h||'home');
      window.scrollTo(0,0);
    }
    window.addEventListener('popstate', onPop);
    return () => window.removeEventListener('popstate', onPop);
  },[]);

  return (
    <>
      <Nav page={page} setPage={navigate}/>
      {page==='home' && <Home setPage={navigate}/>}
      {page==='vendors' && <VendorMarketplace setPage={navigate} setActiveVendor={setActiveVendor}/>}
      {page==='products' && <ProductsPage setPage={navigate}/>}
      {page==='hotel' && <HotelConcierge/>}
      {page==='supplier' && <SupplierPortal/>}
      {page==='cruise' && <CruisePage setPage={navigate}/>}
      <footer style={{background:'var(--noir-2)',padding:'2rem 3rem',display:'flex',justifyContent:'space-between',alignItems:'center',borderTop:'1px solid var(--border)',flexWrap:'wrap',gap:'1rem'}}>
        <div style={{fontFamily:'var(--ff-display)',fontSize:'1.2rem',fontWeight:300,letterSpacing:'3px',textTransform:'uppercase'}}>Bag<span style={{color:'var(--gold)'}}>Free</span></div>
        <div style={{fontSize:'0.78rem',color:'var(--mist)',letterSpacing:'1px'}}>
          Powered by Valet By Nuor · <a href="https://valetbynuor.com" target="_blank" style={{color:'var(--gold)',textDecoration:'none'}}>valetbynuor.com</a> · (813) 816-2448
        </div>
        <div style={{fontSize:'0.75rem',color:'var(--mist)'}}>© 2026 BagFree · All rights reserved</div>
      </footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<script>
function hpCalc() {
  const s = window._hpState || {};
  const days  = parseInt(s['hp-days']  || document.getElementById('hp-days')?.value  || 7);
  const style = s['hp-style'] || document.getElementById('hp-style')?.value || 'leisure';

  // Traditional costs — vary by days and style
  const checked    = days >= 10 ? 210 : 140;  // 2 bags for longer trips
  const overweight = Math.round(checked * 0.2);
  const laundry    = days >= 14 ? 160 : days >= 10 ? 120 : days >= 7 ? 85 : days >= 5 ? 55 : 30;
  const forgotten  = days >= 14 ? 160 : days >= 10 ? 130 : days >= 7 ? 95 : 65;

  const preShopping = {
    luxury:   480,
    business: 280,
    leisure:  180,
    wellness: 220,
  }[style] || 180;

  const tradTotal = checked + overweight + laundry + forgotten + preShopping;

  // BagFree costs — scale with trip length
  const kitBase   = { luxury:480, leisure:220, business:320, wellness:280 };
  const curators  = { luxury:280, leisure:130, business:180, wellness:140 };
  const kitMult   = days >= 14 ? 1.6 : days >= 10 ? 1.3 : 1.0;
  const kitPrice  = Math.round((kitBase[style] || 220) * kitMult);
  const curator   = curators[style] || 130;
  const delivery  = 35;
  const bfTotal  = kitPrice + curator + delivery;
  const saving   = tradTotal - bfTotal;

  const kitNames = { luxury:'Luxury Wardrobe Kit', leisure:'Stay Fresh Kit', business:'Business Travel Kit', wellness:'Wellness Travel Kit' };
  const shopLabels = {
    luxury:   'Pre-trip shopping (clothes, toiletries, accessories)',
    business: 'Pre-trip shopping (shirts, shoes, grooming)',
    leisure:  'Pre-trip shopping (clothes, sunscreen, toiletries)',
    wellness: 'Pre-trip shopping (activewear, supplements, gear)',
  };

  function row(label, val, color) {
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:0.65rem 0;border-bottom:1px solid rgba(253,252,248,0.05);gap:1rem">
      <span style="font-size:1rem;color:rgba(253,252,248,0.65);flex:1">${label}</span>
      <span style="font-size:1.05rem;font-weight:500;color:${color};white-space:nowrap">${val}</span>
    </div>`;
  }

  const tradEl = document.getElementById('hp-trad-items');
  if (tradEl) tradEl.innerHTML =
    row('Checked bag fee (round trip)', '$'+checked, 'rgba(253,252,248,0.85)') +
    row('Overweight bag risk', '$'+overweight, 'rgba(253,252,248,0.85)') +
    row(shopLabels[style] || shopLabels.leisure, '$'+preShopping, 'rgba(253,252,248,0.85)') +
    row('Hotel laundry ('+days+' days)', '$'+laundry, 'rgba(253,252,248,0.85)') +
    row('Forgotten & replacement items', '$'+forgotten, 'rgba(253,252,248,0.85)');

  const bfEl = document.getElementById('hp-bf-items');
  if (bfEl) bfEl.innerHTML =
    row('Checked bag fee', '$0', 'var(--green)') +
    row('Pre-trip shopping', '$0', 'var(--green)') +
    row('Hotel laundry', '$0', 'var(--green)') +
    row('Forgotten items', '$0', 'var(--green)') +
    row(kitNames[style]+' · Valet by Nuor', '$'+kitPrice, 'var(--gold)') +
    row('Local curator curation', '$'+curator, 'var(--gold)') +
    row('Hotel delivery fee', '$'+delivery, 'var(--gold)');

  const tt = document.getElementById('hp-trad-total');
  if (tt) tt.textContent = '$'+tradTotal;
  const bt = document.getElementById('hp-bf-total');
  if (bt) bt.textContent = '$'+bfTotal;
  const sv = document.getElementById('hp-saving');
  if (sv) sv.textContent = saving > 0 ? '$'+saving : '—';
}
// Run on load and re-run whenever React re-mounts the cost section
window.hpCalc = hpCalc;
setTimeout(hpCalc, 1200);
setTimeout(hpCalc, 2500);

// Watch for the cost comparison elements appearing after React navigation
const _hpObserver = new MutationObserver(() => {
  const el = document.getElementById('hp-trad-items');
  if (el && el.innerHTML === '') {
    hpCalc();
  }
});
_hpObserver.observe(document.body, { childList: true, subtree: true });
</script>
</body>
