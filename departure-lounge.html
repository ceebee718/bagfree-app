<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Departure Lounge</title>
</head>
<body>
    <header>
        <h1>Welcome to the Departure Lounge</h1>
    </header>
    <main>
        <section>
            <h2>Flight Information</h2>
            <table>
                <thead>
                    <tr>
                        <th>Flight</th>
                        <th>Destination</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>AB1234</td>
                        <td>New York</td>
                        <td>Boarding</td>
                    </tr>
                    <tr>
                        <td>CD5678</td>
                        <td>London</td>
                        <td>Delayed</td>
                    </tr>
                </tbody>
            </table>
        </section>
        <section>
            <h2>Upcoming Flights</h2>
            <ul>
                <li>Flight AB1234 to New York at 15:00</li>
                <li>Flight CD5678 to London at 16:00</li>
            </ul>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Airport Inc.</p>
    </footer>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Departure Lounge Ready!');
            // Additional JavaScript can be added here
        });
    </script>
</body>
</html>
